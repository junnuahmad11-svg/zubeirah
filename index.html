/* Dashboard */
function Dash({nav}){
  const [members,setM]=useState(DB.g('members'));
  const [chittis,setC]=useState(DB.g('chittis'));
  const [rd,setR]=useState(DB.g('rdEntries'));
  const [payments,setP]=useState(DB.g('payments'));
  const [q,setQ]=useState('');
  const [tab,setTab]=useState('active');

  // Re-read on every render/focus to stay in sync
  useEffect(()=>{
    const sync=()=>{setM(DB.g('members'));setC(DB.g('chittis'));setR(DB.g('rdEntries'));setP(DB.g('payments'))};
    sync();
    window.addEventListener('focus',sync);
    window.addEventListener('storage',sync);
    return()=>{window.removeEventListener('focus',sync);window.removeEventListener('storage',sync)};
  },[]);

  const ct=mId=>chittis.filter(c=>c.memberId===mId).reduce((s,c)=>s+Number(c.amount),0);
  const rt=mId=>rd.filter(r=>r.memberId===mId).reduce((s,r)=>s+Number(r.amount),0);
  const active=members.filter(m=>m.status==='active');
  const c=cm();
  const grand=active.reduce((s,m)=>s+ct(m.id)+rt(m.id),0);
  const coll=payments.filter(p=>p.month===c).reduce((s,p)=>s+Number(p.chittiAmount||0)+Number(p.rdAmount||0),0);
  const paidN=active.filter(m=>{const p=payments.find(pp=>pp.memberId===m.id&&pp.month===c);return p&&p.status==='paid'}).length;
  const overdN=active.length-paidN;

  const filtered=useMemo(()=>{
    const lq=q.toLowerCase().trim();
    return members.filter(m=>{
      if(tab==='active'?m.status!=='active':m.status!=='quit')return false;
      if(!lq)return true;
      return m.name.toLowerCase().includes(lq)||(m.nickname||'').toLowerCase().includes(lq)||(m.location||'').toLowerCase().includes(lq);
    });
  },[members,q,tab]);

  return(<div className="pg">
    <div className="g4" style={{marginBottom:28}}>
      <SC icon="👥" label="Active Members" value={active.length} sub={`${members.filter(m=>m.status==='quit').length} past`} c="#f0b429"/>
      <SC icon="💰" label="Total Portfolio" value={fmt(grand)} sub="All chittis + RD" c="#4895ef"/>
      <SC icon="✅" label="Collected" value={fmt(coll)} sub={ml(c)} c="#06d6a0"/>
      <SC icon="⚠️" label="Pending" value={overdN} sub={`${paidN} paid this month`} c="#ef233c"/>
    </div>
    <div className="crd">
      <div className="sh"><div className="sh-t">Members <span>Directory</span><span className="cp">{filtered.length}</span></div>
        <button className="btn btn-g btn-sm" onClick={()=>nav('add')}>＋ Add</button>
      </div>
      <div className="swrp" style={{marginBottom:14}}><span className="sico">🔍</span>
        <input className="sinp" placeholder="Search by name, nickname, or location…" value={q} onChange={e=>setQ(e.target.value)}/>
      </div>
      <div className="tabs" style={{marginBottom:18}}>
        <button className={`tab ${tab==='active'?'on':''}`} onClick={()=>setTab('active')}>🟢 Active<span className="cp">{members.filter(m=>m.status==='active').length}</span></button>
        <button className={`tab ${tab==='quit'?'on':''}`} onClick={()=>setTab('quit')}>⚫ Past<span className="cp">{members.filter(m=>m.status==='quit').length}</span></button>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:9}}>
        {filtered.length===0?<div className="emp"><div className="emp-i">🔎</div><div className="emp-t">{q?'No results':'No members'}</div></div>
        :filtered.map((m,i)=>{const tc=ct(m.id),tr2=rt(m.id);return(
          <div key={m.id} className="mc sr-a" style={{animationDelay:`${Math.min(i*15,200)}ms`}} onClick={()=>nav('detail',m.id)}>
            <div className="mc-av">{ini(m.name)}</div>
            <div style={{flex:1,minWidth:0}}>
              <div className="mc-nm">{cap(m.name)}</div>
              <div className="mc-sub">
                {m.location&&<span>📍{m.location}</span>}
                {m.nickname&&<span style={{color:'var(--tl)'}}>"{m.nickname}"</span>}
                <span className={`bdg bdg-${m.status==='active'?'a':'q'}`}><span className={`dot dot-${m.status==='active'?'a':'q'}`}></span>{m.status==='active'?'Active':'Quit'}</span>
              </div>
            </div>
            <div className="mc-rt">
              {tc>0&&<div className="ab"><div className="ab-l tg">Chitti</div><div className="ab-v tg">{fmt(tc)}</div></div>}
              {tr2>0&&<div className="ab"><div className="ab-l tv">RD</div><div className="ab-v tv">{fmt(tr2)}</div></div>}
              <div className="ab"><div className="ab-l tro">Total</div><div className="ab-v tro">{fmt(tc+tr2)}</div></div>
            </div>
          </div>
        )})}
      </div>
    </div>
  </div>);
}

function SC({icon,label,value,sub,c}){
  return(<div className="sc" style={{position:'relative'}}>
    <div className="sc-glow" style={{background:c}}></div>
    <div style={{position:'absolute',inset:0,borderRadius:14,border:`1px solid ${c}55`}}></div>
    <div style={{position:'relative'}}>
      <div style={{fontSize:26,marginBottom:10}}>{icon}</div>
      <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'1px',color:c,marginBottom:7}}>{label}</div>
      <div style={{fontSize:typeof value==='number'?32:22,fontWeight:900,color:c,lineHeight:1}}>{value}</div>
      <div style={{fontSize:11,color:c,opacity:.65,marginTop:6}}>{sub}</div>
    </div>
  </div>);
}

/* Member Form */
function MForm({memberId,nav,notify}){
  const isE=!!memberId;
  const [f,sF]=useState({name:'',nickname:'',phone:'',location:'',notes:'',status:'active'});
  const [ch,sCh]=useState([{num:'1',amt:''}]);
  const [ra,sRa]=useState('');
  const [er,sEr]=useState({});
  const [dm,sDm]=useState(false);

  useEffect(()=>{
    if(!isE)return;
    const m=DB.g('members').find(x=>x.id===memberId);
    if(!m)return;
    sF({name:m.name,nickname:m.nickname||'',phone:m.phone||'',location:m.location||'',notes:m.notes||'',status:m.status});
    const cs=DB.g('chittis').filter(x=>x.memberId===memberId);
    sCh(cs.length?cs.map(x=>({num:String(x.chittiNumber),amt:String(x.amount)})):[{num:'1',amt:''}]);
    const r=DB.g('rdEntries').find(x=>x.memberId===memberId);
    sRa(r?String(r.amount):'');
  },[memberId]);

  const val=()=>{
    const e={};
    if(!f.name.trim())e.name='Required';
    if(f.phone&&!/^\d{10}$/.test(f.phone.replace(/\s/g,'')))e.phone='10 digits';
    ch.forEach((c,i)=>{if(c.amt&&(isNaN(c.amt)||Number(c.amt)<=0))e[`c${i}`]='Invalid'});
    if(ra&&(isNaN(ra)||Number(ra)<=0))e.rd='Invalid';
    sEr(e);return!Object.keys(e).length;
  };

  const save=()=>{
    if(!val())return;
    const now=new Date().toISOString();
    if(isE){
      DB.s('members',DB.g('members').map(m=>m.id===memberId?{...m,...f,updatedAt:now}:m));
      let aC=DB.g('chittis').filter(c=>c.memberId!==memberId);
      ch.filter(c=>c.amt).forEach((c,i)=>aC.push({id:Date.now()+i,memberId,chittiNumber:c.num||String(i+1),amount:Number(c.amt),createdAt:now}));
      DB.s('chittis',aC);
      let aR=DB.g('rdEntries').filter(r=>r.memberId!==memberId);
      if(ra&&Number(ra)>0)aR.push({id:Date.now(),memberId,amount:Number(ra),createdAt:now});
      DB.s('rdEntries',aR);
      notify({t:'success',m:'Member updated!'});
      nav('detail',memberId);
    } else {
      const nid=DB.nid('members');
      DB.s('members',[...DB.g('members'),{id:nid,...f,name:cap(f.name.trim()),createdAt:now}]);
      let aC=DB.g('chittis');
      ch.filter(c=>c.amt).forEach((c,i)=>aC.push({id:Date.now()+i,memberId:nid,chittiNumber:c.num||String(i+1),amount:Number(c.amt),createdAt:now}));
      DB.s('chittis',aC);
      let aR=DB.g('rdEntries');
      if(ra&&Number(ra)>0)aR.push({id:Date.now(),memberId:nid,amount:Number(ra),createdAt:now});
      DB.s('rdEntries',aR);
      notify({t:'success',m:'Member added!'});
      nav('dash');
    }
  };

  const del=()=>{
    DB.s('members',DB.g('members').filter(m=>m.id!==memberId));
    DB.s('chittis',DB.g('chittis').filter(c=>c.memberId!==memberId));
    DB.s('rdEntries',DB.g('rdEntries').filter(r=>r.memberId!==memberId));
    DB.s('payments',DB.g('payments').filter(p=>p.memberId!==memberId));
    notify({t:'success',m:'Deleted.'});
    nav('dash');
  };

  return(<div className="pg" style={{maxWidth:700}}>
    {dm&&<Cfm danger title="🗑 Delete Member" text={`Delete "${cap(f.name)}" and all data? Cannot be undone.`} onOk={del} onNo={()=>sDm(false)}/>}
    <button className="bk" onClick={()=>nav(isE?'detail':'dash',memberId)}>← Back</button>
    <div style={{margin:'18px 0 26px'}}><h1 style={{fontSize:26,fontWeight:800}} className="tgg">{isE?'Edit Member':'New Member'}</h1>
      <p style={{color:'var(--ts)',fontSize:13,marginTop:4}}>{isE?'Update details':'Add a new chitti member'}</p>
    </div>
    <div className="fsec"><div className="fsec-t">👤 Personal Info</div>
      <div className="g2">
        <div className="fg"><label className="fl">Name *</label><input className={`fi ${er.name?'er':''}`} placeholder="Name" value={f.name} onChange={e=>sF(p=>({...p,name:e.target.value}))}/>{er.name&&<div className="fi-e">{er.name}</div>}</div>
        <div className="fg"><label className="fl">Nickname</label><input className="fi" placeholder="Optional" value={f.nickname} onChange={e=>sF(p=>({...p,nickname:e.target.value}))}/></div>
        <div className="fg"><label className="fl">Phone</label><input className={`fi ${er.phone?'er':''}`} placeholder="10-digit" value={f.phone} onChange={e=>sF(p=>({...p,phone:e.target.value}))}/>{er.phone&&<div className="fi-e">{er.phone}</div>}</div>
        <div className="fg"><label className="fl">Location</label><input className="fi" placeholder="e.g. TPT, C/O Basheer" value={f.location} onChange={e=>sF(p=>({...p,location:e.target.value}))}/></div>
      </div>
      {isE&&<div className="fg"><label className="fl">Status</label><select className="fi" value={f.status} onChange={e=>sF(p=>({...p,status:e.target.value}))}><option value="active">Active</option><option value="quit">Quit</option></select></div>}
      <div className="fg" style={{marginBottom:0,marginTop:14}}><label className="fl">Notes</label><textarea className="fi fi-ta" placeholder="Notes…" value={f.notes} onChange={e=>sF(p=>({...p,notes:e.target.value}))}/></div>
    </div>
    <div className="fsec"><div className="fsec-t">🎟 Chitti Details</div>
      {ch.map((c,i)=>(<div className="crow" key={i}>
        <div>{i===0&&<label className="fl">Chitti #</label>}<input className="fi" placeholder="#" value={c.num} onChange={e=>sCh(p=>p.map((x,j)=>j===i?{...x,num:e.target.value}:x))}/></div>
        <div>{i===0&&<label className="fl">Amount (₹)</label>}<input className={`fi ${er[`c${i}`]?'er':''}`} type="number" placeholder="0" value={c.amt} onChange={e=>sCh(p=>p.map((x,j)=>j===i?{...x,amt:e.target.value}:x))}/>{er[`c${i}`]&&<div className="fi-e">{er[`c${i}`]}</div>}</div>
        <div style={{paddingBottom:1}}>{ch.length>1&&<button className="btn btn-r btn-xs" onClick={()=>sCh(p=>p.filter((_,j)=>j!==i))}>✕</button>}</div>
      </div>))}
      <button className="btn btn-o btn-sm" onClick={()=>sCh(p=>[...p,{num:String(p.length+1),amt:''}])}>＋ Add Chitti</button>
    </div>
    <div className="fsec"><div className="fsec-t">💳 RD (Monthly)</div>
      <div className="fg" style={{marginBottom:0}}><label className="fl">RD Amount (₹)</label>
        <input className={`fi ${er.rd?'er':''}`} type="number" placeholder="0" value={ra} onChange={e=>sRa(e.target.value)} style={{maxWidth:280}}/>{er.rd&&<div className="fi-e">{er.rd}</div>}
      </div>
    </div>
    <div style={{display:'flex',flexDirection:'column',gap:10}}>
      <button className="btn btn-e btn-f" onClick={save}>{isE?'✅ Update':'✅ Add Member'}</button>
      <button className="btn btn-gh btn-f" onClick={()=>nav(isE?'detail':'dash',memberId)}>Cancel</button>
      {isE&&<button className="btn btn-r btn-f" onClick={()=>sDm(true)}>🗑 Delete Member</button>}
    </div>
  </div>);
}

/* Member Detail */
function MDetail({memberId,nav,notify}){
  const [member,setMm]=useState(null);
  const [chittis,setCh]=useState([]);
  const [rd,setRd]=useState([]);
  const [pay,setPay]=useState([]);
  const [dtab,setDt]=useState('chittis');

  useEffect(()=>{
    const sync=()=>{
      setMm(DB.g('members').find(m=>m.id===memberId)||null);
      setCh(DB.g('chittis').filter(c=>c.memberId===memberId));
      setRd(DB.g('rdEntries').filter(r=>r.memberId===memberId));
      setPay(DB.g('payments').filter(p=>p.memberId===memberId).sort((a,b)=>b.month.localeCompare(a.month)));
    };
    sync();
    window.addEventListener('focus',sync);
    return()=>window.removeEventListener('focus',sync);
  },[memberId]);

  if(!member)return<div className="pg"><div className="emp"><div className="emp-i">❓</div><div className="emp-t">Not found</div></div></div>;

  const cT=chittis.reduce((s,c)=>s+Number(c.amount),0);
  const rT=rd.reduce((s,r)=>s+Number(r.amount),0);
  const tot=cT+rT;

  const wa=()=>{
    if(!member.phone)return;
    const ph=member.phone.replace(/\D/g,'');
    const cl=chittis.map(c=>`  🎟 Chitti #${c.chittiNumber}: ${fmt(c.amount)}`).join('\n');
    const rl=rd.length?`\n  💳 RD: ${fmt(rT)}`:'';
    const msg=`Dear ${cap(member.name)},\n\nI hope this message finds you well.\n\nHere are your payment details for the Chitti:\n\n${cl}${rl}\n\n📊 Total Amount Due: ${fmt(tot)}\n\nKindly arrange the payment at your earliest convenience.\n\nThank you for your cooperation!\n\nBest regards,\nZ — Chitti Management`;
    window.open(`https://wa.me/91${ph}?text=${encodeURIComponent(msg)}`,'_blank');
  };

  return(<div className="pg">
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:22,flexWrap:'wrap',gap:10}}>
      <button className="bk" onClick={()=>nav('dash')}>← Dashboard</button>
      <button className="btn btn-o btn-sm" onClick={()=>nav('edit',memberId)}>✏️ Edit</button>
    </div>
    <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:26,flexWrap:'wrap'}}>
      <div style={{width:68,height:68,borderRadius:18,background:'linear-gradient(135deg,rgba(240,180,41,.2),rgba(255,159,28,.1))',border:'1.5px solid var(--bdb)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,fontWeight:900,color:'var(--g)',flexShrink:0}}>{ini(member.name)}</div>
      <div><h1 style={{fontSize:32,fontWeight:900,lineHeight:1.1,background:'linear-gradient(90deg,var(--gl),var(--am))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>{cap(member.name)}</h1>
        <div style={{display:'flex',gap:8,marginTop:6,alignItems:'center',flexWrap:'wrap'}}>
          <span className={`bdg bdg-${member.status==='active'?'a':'q'}`}><span className={`dot dot-${member.status==='active'?'a':'q'}`}></span>{member.status==='active'?'Active':'Quit'}</span>
          {member.location&&<span style={{fontSize:12,color:'var(--ts)'}}>📍{member.location}</span>}
          {member.nickname&&<span style={{fontSize:12,color:'var(--tl)'}}>"{member.nickname}"</span>}
        </div>
      </div>
    </div>

    <div className="g3" style={{marginBottom:24}}>
      <div className="crd crd-ro"><div style={{fontSize:12,fontWeight:700,color:'var(--ro)',textTransform:'uppercase',letterSpacing:1,marginBottom:14}}>📱 Contact</div>
        <div className="ir"><span className="ir-i">📞</span><div><div className="ir-l">Phone</div><div className="ir-v">{member.phone||'Not provided'}</div></div></div>
        <div className="ir"><span className="ir-i">📍</span><div><div className="ir-l">Location</div><div className="ir-v">{member.location||'—'}</div></div></div>
        {member.notes&&<div className="ir"><span className="ir-i">📝</span><div><div className="ir-l">Notes</div><div className="ir-v" style={{fontSize:13}}>{member.notes}</div></div></div>}
        {member.phone?<button className="btn btn-w btn-f" style={{marginTop:14}} onClick={wa}>💬 Share via WhatsApp</button>
          :<div style={{marginTop:14,padding:'9px 12px',background:'rgba(255,107,157,.05)',borderRadius:8,fontSize:12,color:'var(--ts)',textAlign:'center'}}>Add phone to enable WhatsApp</div>}
      </div>
      <div className="crd crd-g"><div style={{fontSize:12,fontWeight:700,color:'var(--g)',textTransform:'uppercase',letterSpacing:1,marginBottom:14}}>💰 Chitti Amount</div>
        <div className="bn tg" style={{marginBottom:14}}>{fmt(cT)}</div>
        {chittis.length===0?<div style={{color:'var(--ts)',fontSize:13}}>No chittis</div>:chittis.map(c=>(
          <div key={c.id} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid rgba(240,180,41,.1)',fontSize:13}}>
            <span style={{color:'var(--ts)'}}>#{c.chittiNumber}</span><span style={{color:'var(--gl)',fontWeight:700}}>{fmt(c.amount)}</span>
          </div>
        ))}
      </div>
      <div className="crd crd-v"><div style={{fontSize:12,fontWeight:700,color:'var(--vi)',textTransform:'uppercase',letterSpacing:1,marginBottom:14}}>💳 RD Amount</div>
        <div className="bn tv" style={{marginBottom:14}}>{fmt(rT)}</div>
        {rd.length===0?<div style={{color:'var(--ts)',fontSize:13}}>No RD</div>:rd.map(r=>(
          <div key={r.id} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid rgba(177,133,219,.1)',fontSize:13}}>
            <span style={{color:'var(--ts)'}}>Monthly</span><span style={{color:'var(--vi)',fontWeight:700}}>{fmt(r.amount)}</span>
          </div>
        ))}
        <div style={{marginTop:12,padding:'9px 12px',background:'rgba(177,133,219,.1)',borderRadius:8,fontSize:13}}>
          <span style={{color:'var(--ts)'}}>Total/Month: </span><span style={{color:'var(--vi)',fontWeight:800}}>{fmt(tot)}</span>
        </div>
      </div>
    </div>

    <div className="crd">
      <div className="tabs" style={{maxWidth:360,marginBottom:18}}>
        {['chittis','rd','payments'].map(t=>(<button key={t} className={`tab ${dtab===t?'on':''}`} onClick={()=>setDt(t)}>
          {t==='chittis'?'🎟 Chittis':t==='rd'?'💳 RD':'💸 Payments'}
        </button>))}
      </div>
      {dtab==='chittis'&&(chittis.length===0?<div className="emp"><div className="emp-i">🎟</div><div className="emp-t">No chittis</div></div>:
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {chittis.map(c=>(<div key={c.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'13px 16px',background:'var(--bg2)',borderRadius:10,border:'1px solid var(--bd)'}}>
            <span style={{fontWeight:600}}>Chitti #{c.chittiNumber}</span><span style={{fontWeight:800,fontSize:17,color:'var(--g)'}}>{fmt(c.amount)}</span>
          </div>))}
          <div style={{display:'flex',justifyContent:'space-between',padding:'12px 16px',background:'rgba(240,180,41,.08)',borderRadius:10,border:'1px solid rgba(240,180,41,.2)'}}>
            <span style={{fontWeight:700,color:'var(--g)'}}>Total</span><span style={{fontWeight:900,fontSize:18,color:'var(--g)'}}>{fmt(cT)}</span>
          </div>
        </div>)}
      {dtab==='rd'&&(rd.length===0?<div className="emp"><div className="emp-i">💳</div><div className="emp-t">No RD</div></div>:
        <div style={{display:'flex',flexDirection:'column',gap:8}}>{rd.map(r=>(<div key={r.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'13px 16px',background:'var(--bg2)',borderRadius:10,border:'1px solid rgba(177,133,219,.25)'}}>
          <span style={{fontWeight:600}}>Monthly RD</span><span style={{fontWeight:800,fontSize:17,color:'var(--vi)'}}>{fmt(r.amount)}</span>
        </div>))}</div>)}
      {dtab==='payments'&&(pay.length===0?<div className="emp"><div className="emp-i">💸</div><div className="emp-t">No records</div><div className="emp-s">Use Monthly Summary to add</div></div>:
        <div style={{display:'flex',flexDirection:'column',gap:8}}>{pay.map(p=>(<div key={p.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'13px 16px',background:'var(--bg2)',borderRadius:10,border:'1px solid var(--bd)',flexWrap:'wrap',gap:8}}>
          <div><div style={{fontWeight:700,fontSize:14}}>{ml(p.month)}</div><div style={{fontSize:11,color:'var(--ts)',marginTop:2}}>Chitti: {fmt(p.chittiAmount)} · RD: {fmt(p.rdAmount)}</div></div>
          <span className={`bdg bdg-${p.status==='paid'?'p':p.status==='partial'?'pt':'u'}`}>{p.status==='paid'?'✅ Paid':p.status==='partial'?'⚠️ Partial':'❌ Unpaid'}</span>
        </div>))}</div>)}
    </div>
  </div>);
}

/* Monthly Summary */
function Monthly({nav,notify}){
  const [sel,setSel]=useState(cm());
  const [members,setM]=useState([]);
  const [chittis,setC]=useState([]);
  const [rd,setR]=useState([]);
  const [payments,setP]=useState([]);
  const [sort,setSort]=useState('name');
  const [editRow,setER]=useState(null);
  const [sq,setSq]=useState('');

  useEffect(()=>{
    const sync=()=>{setM(DB.g('members').filter(m=>m.status==='active'));setC(DB.g('chittis'));setR(DB.g('rdEntries'));setP(DB.g('payments'))};
    sync();
    window.addEventListener('focus',sync);
    return()=>window.removeEventListener('focus',sync);
  },[]);

  const months=useMemo(()=>{const r=[];const n=new Date();for(let i=0;i<24;i++){const d=new Date(n.getFullYear(),n.getMonth()-i,1);r.push(d.toISOString().slice(0,7))}return r},[]);

  const ct=mId=>chittis.filter(c=>c.memberId===mId).reduce((s,c)=>s+Number(c.amount),0);
  const rt=mId=>rd.filter(r=>r.memberId===mId).reduce((s,r)=>s+Number(r.amount),0);
  const gP=mId=>payments.find(p=>p.memberId===mId&&p.month===sel);

  const rows=useMemo(()=>{
    const lq=sq.toLowerCase().trim();
    let r=members
      .filter(m=>!lq||(m.name.toLowerCase().includes(lq)||(m.location||'').toLowerCase().includes(lq)||(m.nickname||'').toLowerCase().includes(lq)))
      .map(m=>{const p=gP(m.id),cd=ct(m.id),rd2=rt(m.id),tot=cd+rd2,st=p?p.status:'unpaid';return{member:m,cd,rd2,tot,pay:p,st}});
    if(sort==='name')r.sort((a,b)=>a.member.name.localeCompare(b.member.name));
    else if(sort==='status'){const o={paid:0,partial:1,unpaid:2};r.sort((a,b)=>o[a.st]-o[b.st])}
    else if(sort==='amt')r.sort((a,b)=>b.tot-a.tot);
    return r;
  },[members,chittis,rd,payments,sel,sort,sq]);

  const stats=useMemo(()=>({total:rows.length,paid:rows.filter(r=>r.st==='paid').length,partial:rows.filter(r=>r.st==='partial').length,unpaid:rows.filter(r=>r.st==='unpaid').length,
    coll:rows.reduce((s,r)=>s+(r.pay?Number(r.pay.chittiAmount||0)+Number(r.pay.rdAmount||0):0),0),
    due:rows.reduce((s,r)=>s+r.tot,0)}),[rows]);

  const savePay=(mId,status,ca,ra)=>{
    let all=DB.g('payments');
    const ex=all.find(p=>p.memberId===mId&&p.month===sel);
    if(ex)all=all.map(p=>p.id===ex.id?{...p,status,chittiAmount:Number(ca||0),rdAmount:Number(ra||0),updatedAt:new Date().toISOString()}:p);
    else all.push({id:Date.now(),memberId:mId,month:sel,chittiAmount:Number(ca||0),rdAmount:Number(ra||0),status,createdAt:new Date().toISOString()});
    DB.s('payments',all);
    setP(DB.g('payments'));
    setER(null);
    notify({t:'success',m:'Payment updated!'});
  };

  return(<div className="pg">
    <button className="bk" onClick={()=>nav('dash')}>← Dashboard</button>
    <div style={{margin:'18px 0 24px'}}><h1 style={{fontSize:26,fontWeight:800}} className="tgg">Monthly Summary</h1>
      <p style={{color:'var(--ts)',fontSize:13,marginTop:4}}>Track and update payment status</p>
    </div>
    <div style={{display:'flex',gap:10,marginBottom:20,flexWrap:'wrap',alignItems:'center'}}>
      <select className="msel" value={sel} onChange={e=>setSel(e.target.value)}>{months.map(m=><option key={m} value={m}>{ml(m)}</option>)}</select>
      <select className="msel" value={sort} onChange={e=>setSort(e.target.value)}><option value="name">A–Z</option><option value="status">Status</option><option value="amt">Amount</option></select>
      <div style={{flex:1,minWidth:180,position:'relative'}}><span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'var(--ts)',fontSize:14}}>🔍</span>
        <input className="msel" style={{paddingLeft:34,width:'100%'}} placeholder="Search…" value={sq} onChange={e=>setSq(e.target.value)}/></div>
    </div>
    <div className="g4" style={{marginBottom:18}}>
      <div className="crd" style={{textAlign:'center',padding:16}}><div style={{fontSize:26,fontWeight:900,color:'var(--sa)'}}>{stats.total}</div><div style={{fontSize:11,color:'var(--ts)',marginTop:3}}>Total</div></div>
      <div className="crd" style={{textAlign:'center',padding:16}}><div style={{fontSize:26,fontWeight:900,color:'var(--em)'}}>{stats.paid}</div><div style={{fontSize:11,color:'var(--ts)',marginTop:3}}>✅ Paid</div></div>
      <div className="crd" style={{textAlign:'center',padding:16}}><div style={{fontSize:26,fontWeight:900,color:'var(--g)'}}>{stats.partial}</div><div style={{fontSize:11,color:'var(--ts)',marginTop:3}}>⚠️ Partial</div></div>
      <div className="crd" style={{textAlign:'center',padding:16}}><div style={{fontSize:26,fontWeight:900,color:'var(--rb)'}}>{stats.unpaid}</div><div style={{fontSize:11,color:'var(--ts)',marginTop:3}}>❌ Unpaid</div></div>
    </div>
    <div style={{display:'flex',gap:12,marginBottom:20,flexWrap:'wrap'}}>
      <div className="crd" style={{flex:1,padding:'12px 18px',display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{color:'var(--ts)',fontSize:13}}>Due</span><span style={{fontSize:20,fontWeight:900,color:'var(--ro)'}}>{fmt(stats.due)}</span></div>
      <div className="crd" style={{flex:1,padding:'12px 18px',display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{color:'var(--ts)',fontSize:13}}>Collected</span><span style={{fontSize:20,fontWeight:900,color:'var(--em)'}}>{fmt(stats.coll)}</span></div>
      <div className="crd" style={{flex:1,padding:'12px 18px',display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{color:'var(--ts)',fontSize:13}}>Remaining</span><span style={{fontSize:20,fontWeight:900,color:'var(--rb)'}}>{fmt(stats.due-stats.coll)}</span></div>
    </div>
    <div className="crd" style={{padding:0,overflow:'hidden'}}><div className="tbw"><table className="tbl"><thead><tr>
      <th>#</th><th>Member</th><th>Location</th><th>Chitti</th><th>RD</th><th>Total</th><th>Paid</th><th>Status</th><th>Action</th>
    </tr></thead><tbody>
      {rows.length===0?<tr><td colSpan={9} style={{textAlign:'center',padding:36,color:'var(--ts)'}}>No members</td></tr>
      :rows.map((r,i)=>{const pa=r.pay?Number(r.pay.chittiAmount||0)+Number(r.pay.rdAmount||0):0;return(
        <tr key={r.member.id}>
          <td style={{color:'var(--ts)',fontSize:12}}>{i+1}</td>
          <td><div style={{fontWeight:700,color:'var(--g)',fontSize:14,cursor:'pointer'}} onClick={()=>nav('detail',r.member.id)}>{cap(r.member.name)}</div>{r.member.nickname&&<div style={{fontSize:10,color:'var(--tl)'}}>{r.member.nickname}</div>}</td>
          <td style={{color:'var(--ts)',fontSize:12}}>{r.member.location||'—'}</td>
          <td style={{color:'var(--sa)',fontWeight:600,fontSize:13}}>{fmt(r.cd)}</td>
          <td style={{color:'var(--vi)',fontWeight:600,fontSize:13}}>{fmt(r.rd2)}</td>
          <td style={{color:'var(--g)',fontWeight:800,fontSize:14}}>{fmt(r.tot)}</td>
          <td style={{color:pa>0?'var(--em)':'var(--ts)',fontWeight:600,fontSize:13}}>{pa>0?fmt(pa):'—'}</td>
          <td><span className={`bdg bdg-${r.st==='paid'?'p':r.st==='partial'?'pt':'u'}`}>{r.st==='paid'?'✅ Paid':r.st==='partial'?'⚠️ Partial':'❌ Unpaid'}</span></td>
          <td><button className="btn btn-o btn-xs" onClick={()=>setER(r)}>Update</button></td>
        </tr>
      )})}
    </tbody></table></div></div>
    {editRow&&<PMdl row={editRow} month={sel} onSave={(s,a,b)=>savePay(editRow.member.id,s,a,b)} onClose={()=>setER(null)}/>}
  </div>);
}

function PMdl({row,month,onSave,onClose}){
  const [st,setSt]=useState(row.pay?.status||'unpaid');
  const [ca,sCa]=useState(String(row.pay?.chittiAmount||''));
  const [ra,sRa]=useState(String(row.pay?.rdAmount||''));
  const pt=Number(ca||0)+Number(ra||0);
  return(<div className="ov" onClick={onClose}><div className="mdl" onClick={e=>e.stopPropagation()}>
    <div className="mdl-t">💸 Update Payment</div>
    <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:18}}>
      <div style={{width:42,height:42,borderRadius:11,background:'rgba(240,180,41,.15)',border:'1px solid var(--bdb)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,color:'var(--g)',fontSize:15}}>{ini(row.member.name)}</div>
      <div><div style={{fontWeight:700,color:'var(--g)',fontSize:17}}>{cap(row.member.name)}</div><div style={{fontSize:11,color:'var(--ts)'}}>{ml(month)} · Due: {fmt(row.tot)}</div></div>
    </div>
    <div className="fg"><label className="fl">Chitti Paid (₹) <span style={{color:'var(--ts)',fontWeight:400,textTransform:'none',letterSpacing:0}}>— due {fmt(row.cd)}</span></label><input className="fi" type="number" value={ca} onChange={e=>sCa(e.target.value)} placeholder="0"/></div>
    <div className="fg"><label className="fl">RD Paid (₹) <span style={{color:'var(--ts)',fontWeight:400,textTransform:'none',letterSpacing:0}}>— due {fmt(row.rd2)}</span></label><input className="fi" type="number" value={ra} onChange={e=>sRa(e.target.value)} placeholder="0"/></div>
    <div className="fg" style={{marginBottom:4}}><label className="fl">Status</label><select className="fi" value={st} onChange={e=>setSt(e.target.value)}><option value="paid">✅ Paid</option><option value="partial">⚠️ Partial</option><option value="unpaid">❌ Unpaid</option></select></div>
    {pt>0&&<div style={{marginBottom:16,padding:'9px 12px',background:'rgba(6,214,160,.08)',borderRadius:8,fontSize:13}}>
      <span style={{color:'var(--ts)'}}>Recording: </span><span style={{color:'var(--em)',fontWeight:700}}>{fmt(pt)}</span>
      {pt<row.tot&&<span style={{color:'var(--rb)',fontSize:11,marginLeft:8}}>(Balance: {fmt(row.tot-pt)})</span>}
    </div>}
    <div className="mdl-a"><button className="btn btn-gh btn-f" onClick={onClose}>Cancel</button><button className="btn btn-g btn-f" onClick={()=>onSave(st,ca,ra)}>Save</button></div>
  </div></div>);
}

/* App */
function App(){
  const [pg,sPg]=useState('dash');
  const [dt,sDt]=useState(null);
  const [ntf,sNtf]=useState(null);
  // Force re-render key when navigating to same page type
  const [rk,sRk]=useState(0);
  const nav=(p,d)=>{sPg(p);sDt(d??null);sRk(k=>k+1);window.scrollTo({top:0,behavior:'smooth'})};
  const notify=n=>sNtf(n);
  return(<>
    <Hdr nav={nav}/>
    {pg==='dash'&&<Dash key={rk} nav={nav}/>}
    {pg==='add'&&<MForm key={rk} memberId={null} nav={nav} notify={notify}/>}
    {pg==='edit'&&<MForm key={rk} memberId={dt} nav={nav} notify={notify}/>}
    {pg==='detail'&&<MDetail key={rk} memberId={dt} nav={nav} notify={notify}/>}
    {pg==='monthly'&&<Monthly key={rk} nav={nav} notify={notify}/>}
    <Ntf n={ntf} onClose={()=>sNtf(null)}/>
  </>);
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>

<html lang="en">
<head>

<title>Z — Chitti Management</title>

<style>
:root{
--bg:#080810;--bg2:#0e0e1c;--bgc:#111120;--bgch:#16162a;--bgi:#0a0a18;
--g:#f0b429;--gl:#ffd166;--gd:#c88a00;--am:#ff9f1c;
--em:#06d6a0;--emd:#04a87e;--rb:#ef233c;--rbd:#c01831;
--sa:#4895ef;--vi:#b185db;--ro:#ff6b9d;--tl:#2ec4b6;

/* Notification */
function Ntf({n,onClose}){
  useEffect(()=>{if(n){const t=setTimeout(onClose,3200);return()=>clearTimeout(t)}},[n]);
  if(!n)return null;
  return<div className={`ntf ntf-${n.t==='success'?'s':n.t==='error'?'e':'i'}`}><span>{n.t==='success'?'✅':n.t==='error'?'❌':'ℹ️'}</span>{n.m}</div>;
}

/* Confirm */
function Cfm({title,text,onOk,onNo,danger}){
  return(<div className="ov" onClick={onNo}><div className="mdl" onClick={e=>e.stopPropagation()}>
    <div className="mdl-t">{title}</div><div className="mdl-tx">{text}</div>

}

/* Dashboard */
function Dash({nav}){
  const [members,setM]=useState(DB.g('members'));
  const [chittis,setC]=useState(DB.g('chittis'));
  const [rd,setR]=useState(DB.g('rdEntries'));
  const [payments,setP]=useState(DB.g('payments'));
  const [q,setQ]=useState('');
  const [tab,setTab]=useState('active');

  // Re-read on every render/focus to stay in sync
  useEffect(()=>{
    const sync=()=>{setM(DB.g('members'));setC(DB.g('chittis'));setR(DB.g('rdEntries'));setP(DB.g('payments'))};
    sync();
    window.addEventListener('focus',sync);
    window.addEventListener('storage',sync);
    return()=>{window.removeEventListener('focus',sync);window.removeEventListener('storage',sync)};
  },[]);

  const ct=mId=>chittis.filter(c=>c.memberId===mId).reduce((s,c)=>s+Number(c.amount),0);
  const rt=mId=>rd.filter(r=>r.memberId===mId).reduce((s,r)=>s+Number(r.amount),0);
  const active=members.filter(m=>m.status==='active');
  const c=cm();
  const grand=active.reduce((s,m)=>s+ct(m.id)+rt(m.id),0);
  const coll=payments.filter(p=>p.month===c).reduce((s,p)=>s+Number(p.chittiAmount||0)+Number(p.rdAmount||0),0);
  const paidN=active.filter(m=>{const p=payments.find(pp=>pp.memberId===m.id&&pp.month===c);return p&&p.status==='paid'}).length;
  const overdN=active.length-paidN;

  const filtered=useMemo(()=>{
    const lq=q.toLowerCase().trim();
    return members.filter(m=>{
      if(tab==='active'?m.status!=='active':m.status!=='quit')return false;
      if(!lq)return true;
      return m.name.toLowerCase().includes(lq)||(m.nickname||'').toLowerCase().includes(lq)||(m.location||'').toLowerCase().includes(lq);
    });
  },[members,q,tab]);

  return(<div className="pg">
    <div className="g4" style={{marginBottom:28}}>
      <SC icon="👥" label="Active Members" value={active.length} sub={`${members.filter(m=>m.status==='quit').length} past`} c="#f0b429"/>
      <SC icon="💰" label="Total Portfolio" value={fmt(grand)} sub="All chittis + RD" c="#4895ef"/>
      <SC icon="✅" label="Collected" value={fmt(coll)} sub={ml(c)} c="#06d6a0"/>
      <SC icon="⚠️" label="Pending" value={overdN} sub={`${paidN} paid this month`} c="#ef233c"/>
    </div>
    <div className="crd">
      <div className="sh"><div className="sh-t">Members <span>Directory</span><span className="cp">{filtered.length}</span></div>
        <button className="btn btn-g btn-sm" onClick={()=>nav('add')}>＋ Add</button>
      </div>
      <div className="swrp" style={{marginBottom:14}}><span className="sico">🔍</span>
        <input className="sinp" placeholder="Search by name, nickname, or location…" value={q} onChange={e=>setQ(e.target.value)}/>
      </div>
      <div className="tabs" style={{marginBottom:18}}>
        <button className={`tab ${tab==='active'?'on':''}`} onClick={()=>setTab('active')}>🟢 Active<span className="cp">{members.filter(m=>m.status==='active').length}</span></button>
        <button className={`tab ${tab==='quit'?'on':''}`} onClick={()=>setTab('quit')}>⚫ Past<span className="cp">{members.filter(m=>m.status==='quit').length}</span></button>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:9}}>
        {filtered.length===0?<div className="emp"><div className="emp-i">🔎</div><div className="emp-t">{q?'No results':'No members'}</div></div>
        :filtered.map((m,i)=>{const tc=ct(m.id),tr2=rt(m.id);return(
          <div key={m.id} className="mc sr-a" style={{animationDelay:`${Math.min(i*15,200)}ms`}} onClick={()=>nav('detail',m.id)}>
            <div className="mc-av">{ini(m.name)}</div>
            <div style={{flex:1,minWidth:0}}>
              <div className="mc-nm">{cap(m.name)}</div>
              <div className="mc-sub">
                {m.location&&<span>📍{m.location}</span>}
                {m.nickname&&<span style={{color:'var(--tl)'}}>"{m.nickname}"</span>}
                <span className={`bdg bdg-${m.status==='active'?'a':'q'}`}><span className={`dot dot-${m.status==='active'?'a':'q'}`}></span>{m.status==='active'?'Active':'Quit'}</span>
              </div>
            </div>
            <div className="mc-rt">
              {tc>0&&<div className="ab"><div className="ab-l tg">Chitti</div><div className="ab-v tg">{fmt(tc)}</div></div>}
              {tr2>0&&<div className="ab"><div className="ab-l tv">RD</div><div className="ab-v tv">{fmt(tr2)}</div></div>}
              <div className="ab"><div className="ab-l tro">Total</div><div className="ab-v tro">{fmt(tc+tr2)}</div></div>
            </div>
          </div>
        )})}
      </div>
    </div>
  </div>);
}

function SC({icon,label,value,sub,c}){
  return(<div className="sc" style={{position:'relative'}}>
    <div className="sc-glow" style={{background:c}}></div>
    <div style={{position:'absolute',inset:0,borderRadius:14,border:`1px solid ${c}55`}}></div>
    <div style={{position:'relative'}}>
      <div style={{fontSize:26,marginBottom:10}}>{icon}</div>
      <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'1px',color:c,marginBottom:7}}>{label}</div>
      <div style={{fontSize:typeof value==='number'?32:22,fontWeight:900,color:c,lineHeight:1}}>{value}</div>

  </div>);
}

/* Member Form */
function MForm({memberId,nav,notify}){
  const isE=!!memberId;
  const [f,sF]=useState({name:'',nickname:'',phone:'',location:'',notes:'',status:'active'});
  const [ch,sCh]=useState([{num:'1',amt:''}]);
  const [ra,sRa]=useState('');
  const [er,sEr]=useState({});
  const [dm,sDm]=useState(false);

  useEffect(()=>{
    if(!isE)return;
    const m=DB.g('members').find(x=>x.id===memberId);
    if(!m)return;
    sF({name:m.name,nickname:m.nickname||'',phone:m.phone||'',location:m.location||'',notes:m.notes||'',status:m.status});
    const cs=DB.g('chittis').filter(x=>x.memberId===memberId);
    sCh(cs.length?cs.map(x=>({num:String(x.chittiNumber),amt:String(x.amount)})):[{num:'1',amt:''}]);
    const r=DB.g('rdEntries').find(x=>x.memberId===memberId);
    sRa(r?String(r.amount):'');
  },[memberId]);

  const val=()=>{
    const e={};
    if(!f.name.trim())e.name='Required';
    if(f.phone&&!/^\d{10}$/.test(f.phone.replace(/\s/g,'')))e.phone='10 digits';
    ch.forEach((c,i)=>{if(c.amt&&(isNaN(c.amt)||Number(c.amt)<=0))e[`c${i}`]='Invalid'});
    if(ra&&(isNaN(ra)||Number(ra)<=0))e.rd='Invalid';
    sEr(e);return!Object.keys(e).length;
  };

  const save=()=>{
    if(!val())return;
    const now=new Date().toISOString();
    if(isE){
      DB.s('members',DB.g('members').map(m=>m.id===memberId?{...m,...f,updatedAt:now}:m));
      let aC=DB.g('chittis').filter(c=>c.memberId!==memberId);
      ch.filter(c=>c.amt).forEach((c,i)=>aC.push({id:Date.now()+i,memberId,chittiNumber:c.num||String(i+1),amount:Number(c.amt),createdAt:now}));
      DB.s('chittis',aC);
      let aR=DB.g('rdEntries').filter(r=>r.memberId!==memberId);
      if(ra&&Number(ra)>0)aR.push({id:Date.now(),memberId,amount:Number(ra),createdAt:now});
      DB.s('rdEntries',aR);
      notify({t:'success',m:'Member updated!'});
      nav('detail',memberId);
    } else {
      const nid=DB.nid('members');
      DB.s('members',[...DB.g('members'),{id:nid,...f,name:cap(f.name.trim()),createdAt:now}]);
      let aC=DB.g('chittis');
      ch.filter(c=>c.amt).forEach((c,i)=>aC.push({id:Date.now()+i,memberId:nid,chittiNumber:c.num||String(i+1),amount:Number(c.amt),createdAt:now}));
      DB.s('chittis',aC);
      let aR=DB.g('rdEntries');
      if(ra&&Number(ra)>0)aR.push({id:Date.now(),memberId:nid,amount:Number(ra),createdAt:now});
      DB.s('rdEntries',aR);
      notify({t:'success',m:'Member added!'});
      nav('dash');
    }
  };

  const del=()=>{
    DB.s('members',DB.g('members').filter(m=>m.id!==memberId));
    DB.s('chittis',DB.g('chittis').filter(c=>c.memberId!==memberId));
    DB.s('rdEntries',DB.g('rdEntries').filter(r=>r.memberId!==memberId));
    DB.s('payments',DB.g('payments').filter(p=>p.memberId!==memberId));
    notify({t:'success',m:'Deleted.'});
    nav('dash');
  };

  return(<div className="pg" style={{maxWidth:700}}>
    {dm&&<Cfm danger title="🗑 Delete Member" text={`Delete "${cap(f.name)}" and all data? Cannot be undone.`} onOk={del} onNo={()=>sDm(false)}/>}
    <button className="bk" onClick={()=>nav(isE?'detail':'dash',memberId)}>← Back</button>
    <div style={{margin:'18px 0 26px'}}><h1 style={{fontSize:26,fontWeight:800}} className="tgg">{isE?'Edit Member':'New Member'}</h1>
      <p style={{color:'var(--ts)',fontSize:13,marginTop:4}}>{isE?'Update details':'Add a new chitti member'}</p>
    </div>
    <div className="fsec"><div className="fsec-t">👤 Personal Info</div>
      <div className="g2">
        <div className="fg"><label className="fl">Name *</label><input className={`fi ${er.name?'er':''}`} placeholder="Name" value={f.name} onChange={e=>sF(p=>({...p,name:e.target.value}))}/>{er.name&&<div className="fi-e">{er.name}</div>}</div>
        <div className="fg"><label className="fl">Nickname</label><input className="fi" placeholder="Optional" value={f.nickname} onChange={e=>sF(p=>({...p,nickname:e.target.value}))}/></div>
        <div className="fg"><label className="fl">Phone</label><input className={`fi ${er.phone?'er':''}`} placeholder="10-digit" value={f.phone} onChange={e=>sF(p=>({...p,phone:e.target.value}))}/>{er.phone&&<div className="fi-e">{er.phone}</div>}</div>
        <div className="fg"><label className="fl">Location</label><input className="fi" placeholder="e.g. TPT, C/O Basheer" value={f.location} onChange={e=>sF(p=>({...p,location:e.target.value}))}/></div>
      </div>
      {isE&&<div className="fg"><label className="fl">Status</label><select className="fi" value={f.status} onChange={e=>sF(p=>({...p,status:e.target.value}))}><option value="active">Active</option><option value="quit">Quit</option></select></div>}
      <div className="fg" style={{marginBottom:0,marginTop:14}}><label className="fl">Notes</label><textarea className="fi fi-ta" placeholder="Notes…" value={f.notes} onChange={e=>sF(p=>({...p,notes:e.target.value}))}/></div>
    </div>
    <div className="fsec"><div className="fsec-t">🎟 Chitti Details</div>
      {ch.map((c,i)=>(<div className="crow" key={i}>
        <div>{i===0&&<label className="fl">Chitti #</label>}<input className="fi" placeholder="#" value={c.num} onChange={e=>sCh(p=>p.map((x,j)=>j===i?{...x,num:e.target.value}:x))}/></div>
        <div>{i===0&&<label className="fl">Amount (₹)</label>}<input className={`fi ${er[`c${i}`]?'er':''}`} type="number" placeholder="0" value={c.amt} onChange={e=>sCh(p=>p.map((x,j)=>j===i?{...x,amt:e.target.value}:x))}/>{er[`c${i}`]&&<div className="fi-e">{er[`c${i}`]}</div>}</div>
        <div style={{paddingBottom:1}}>{ch.length>1&&<button className="btn btn-r btn-xs" onClick={()=>sCh(p=>p.filter((_,j)=>j!==i))}>✕</button>}</div>
      </div>))}
      <button className="btn btn-o btn-sm" onClick={()=>sCh(p=>[...p,{num:String(p.length+1),amt:''}])}>＋ Add Chitti</button>
    </div>
    <div className="fsec"><div className="fsec-t">💳 RD (Monthly)</div>
      <div className="fg" style={{marginBottom:0}}><label className="fl">RD Amount (₹)</label>
        <input className={`fi ${er.rd?'er':''}`} type="number" placeholder="0" value={ra} onChange={e=>sRa(e.target.value)} style={{maxWidth:280}}/>{er.rd&&<div className="fi-e">{er.rd}</div>}
      </div>
    </div>
    <div style={{display:'flex',flexDirection:'column',gap:10}}>
      <button className="btn btn-e btn-f" onClick={save}>{isE?'✅ Update':'✅ Add Member'}</button>
      <button className="btn btn-gh btn-f" onClick={()=>nav(isE?'detail':'dash',memberId)}>Cancel</button>
      {isE&&<button className="btn btn-r btn-f" onClick={()=>sDm(true)}>🗑 Delete Member</button>}
    </div>
  </div>);
}

            <span style={{fontWeight:600}}>Chitti #{c.chittiNumber}</span><span style={{fontWeight:800,fontSize:17,color:'var(--g)'}}>{fmt(c.amount)}</span>
          </div>))}
          <div style={{display:'flex',justifyContent:'space-between',padding:'12px 16px',background:'rgba(240,180,41,.08)',borderRadius:10,border:'1px solid rgba(240,180,41,.2)'}}>
            <span style={{fontWeight:700,color:'var(--g)'}}>Total</span><span style={{fontWeight:900,fontSize:18,color:'var(--g)'}}>{fmt(cT)}</span>
          </div>
        </div>)}
      {dtab==='rd'&&(rd.length===0?<div className="emp"><div className="emp-i">💳</div><div className="emp-t">No RD</div></div>:
        <div style={{display:'flex',flexDirection:'column',gap:8}}>{rd.map(r=>(<div key={r.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'13px 16px',background:'var(--bg2)',borderRadius:10,border:'1px solid rgba(177,133,219,.25)'}}>
          <span style={{fontWeight:600}}>Monthly RD</span><span style={{fontWeight:800,fontSize:17,color:'var(--vi)'}}>{fmt(r.amount)}</span>
        </div>))}</div>)}
      {dtab==='payments'&&(pay.length===0?<div className="emp"><div className="emp-i">💸</div><div className="emp-t">No records</div><div className="emp-s">Use Monthly Summary to add</div></div>:
        <div style={{display:'flex',flexDirection:'column',gap:8}}>{pay.map(p=>(<div key={p.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'13px 16px',background:'var(--bg2)',borderRadius:10,border:'1px solid var(--bd)',flexWrap:'wrap',gap:8}}>
          <div><div style={{fontWeight:700,fontSize:14}}>{ml(p.month)}</div><div style={{fontSize:11,color:'var(--ts)',marginTop:2}}>Chitti: {fmt(p.chittiAmount)} · RD: {fmt(p.rdAmount)}</div></div>
          <span className={`bdg bdg-${p.status==='paid'?'p':p.status==='partial'?'pt':'u'}`}>{p.status==='paid'?'✅ Paid':p.status==='partial'?'⚠️ Partial':'❌ Unpaid'}</span>
        </div>))}</div>)}
    </div>
  </div>);
}

/* Monthly Summary */
function Monthly({nav,notify}){
  const [sel,setSel]=useState(cm());
  const [members,setM]=useState([]);
  const [chittis,setC]=useState([]);
  const [rd,setR]=useState([]);
  const [payments,setP]=useState([]);
  const [sort,setSort]=useState('name');
  const [editRow,setER]=useState(null);
  const [sq,setSq]=useState('');

  useEffect(()=>{
    const sync=()=>{setM(DB.g('members').filter(m=>m.status==='active'));setC(DB.g('chittis'));setR(DB.g('rdEntries'));setP(DB.g('payments'))};
    sync();
    window.addEventListener('focus',sync);
    return()=>window.removeEventListener('focus',sync);
  },[]);

  const months=useMemo(()=>{const r=[];const n=new Date();for(let i=0;i<24;i++){const d=new Date(n.getFullYear(),n.getMonth()-i,1);r.push(d.toISOString().slice(0,7))}return r},[]);

  const ct=mId=>chittis.filter(c=>c.memberId===mId).reduce((s,c)=>s+Number(c.amount),0);
  const rt=mId=>rd.filter(r=>r.memberId===mId).reduce((s,r)=>s+Number(r.amount),0);
  const gP=mId=>payments.find(p=>p.memberId===mId&&p.month===sel);

  const rows=useMemo(()=>{
    const lq=sq.toLowerCase().trim();
    let r=members
      .filter(m=>!lq||(m.name.toLowerCase().includes(lq)||(m.location||'').toLowerCase().includes(lq)||(m.nickname||'').toLowerCase().includes(lq)))
      .map(m=>{const p=gP(m.id),cd=ct(m.id),rd2=rt(m.id),tot=cd+rd2,st=p?p.status:'unpaid';return{member:m,cd,rd2,tot,pay:p,st}});
    if(sort==='name')r.sort((a,b)=>a.member.name.localeCompare(b.member.name));
    else if(sort==='status'){const o={paid:0,partial:1,unpaid:2};r.sort((a,b)=>o[a.st]-o[b.st])}
    else if(sort==='amt')r.sort((a,b)=>b.tot-a.tot);
    return r;
  },[members,chittis,rd,payments,sel,sort,sq]);

  const stats=useMemo(()=>({total:rows.length,paid:rows.filter(r=>r.st==='paid').length,partial:rows.filter(r=>r.st==='partial').length,unpaid:rows.filter(r=>r.st==='unpaid').length,
    coll:rows.reduce((s,r)=>s+(r.pay?Number(r.pay.chittiAmount||0)+Number(r.pay.rdAmount||0):0),0),
    due:rows.reduce((s,r)=>s+r.tot,0)}),[rows]);

  const savePay=(mId,status,ca,ra)=>{
    let all=DB.g('payments');
    const ex=all.find(p=>p.memberId===mId&&p.month===sel);
    if(ex)all=all.map(p=>p.id===ex.id?{...p,status,chittiAmount:Number(ca||0),rdAmount:Number(ra||0),updatedAt:new Date().toISOString()}:p);
    else all.push({id:Date.now(),memberId:mId,month:sel,chittiAmount:Number(ca||0),rdAmount:Number(ra||0),status,createdAt:new Date().toISOString()});
    DB.s('payments',all);
    setP(DB.g('payments'));
    setER(null);
    notify({t:'success',m:'Payment updated!'});
  };

  return(<div className="pg">
    <button className="bk" onClick={()=>nav('dash')}>← Dashboard</button>
    <div style={{margin:'18px 0 24px'}}><h1 style={{fontSize:26,fontWeight:800}} className="tgg">Monthly Summary</h1>
      <p style={{color:'var(--ts)',fontSize:13,marginTop:4}}>Track and update payment status</p>
    </div>
    <div style={{display:'flex',gap:10,marginBottom:20,flexWrap:'wrap',alignItems:'center'}}>
      <select className="msel" value={sel} onChange={e=>setSel(e.target.value)}>{months.map(m=><option key={m} value={m}>{ml(m)}</option>)}</select>
      <select className="msel" value={sort} onChange={e=>setSort(e.target.value)}><option value="name">A–Z</option><option value="status">Status</option><option value="amt">Amount</option></select>
      <div style={{flex:1,minWidth:180,position:'relative'}}><span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'var(--ts)',fontSize:14}}>🔍</span>
        <input className="msel" style={{paddingLeft:34,width:'100%'}} placeholder="Search…" value={sq} onChange={e=>setSq(e.target.value)}/></div>
    </div>
    <div className="g4" style={{marginBottom:18}}>
      <div className="crd" style={{textAlign:'center',padding:16}}><div style={{fontSize:26,fontWeight:900,color:'var(--sa)'}}>{stats.total}</div><div style={{fontSize:11,color:'var(--ts)',marginTop:3}}>Total</div></div>
      <div className="crd" style={{textAlign:'center',padding:16}}><div style={{fontSize:26,fontWeight:900,color:'var(--em)'}}>{stats.paid}</div><div style={{fontSize:11,color:'var(--ts)',marginTop:3}}>✅ Paid</div></div>
      <div className="crd" style={{textAlign:'center',padding:16}}><div style={{fontSize:26,fontWeight:900,color:'var(--g)'}}>{stats.partial}</div><div style={{fontSize:11,color:'var(--ts)',marginTop:3}}>⚠️ Partial</div></div>
      <div className="crd" style={{textAlign:'center',padding:16}}><div style={{fontSize:26,fontWeight:900,color:'var(--rb)'}}>{stats.unpaid}</div><div style={{fontSize:11,color:'var(--ts)',marginTop:3}}>❌ Unpaid</div></div>
    </div>
    <div style={{display:'flex',gap:12,marginBottom:20,flexWrap:'wrap'}}>
      <div className="crd" style={{flex:1,padding:'12px 18px',display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{color:'var(--ts)',fontSize:13}}>Due</span><span style={{fontSize:20,fontWeight:900,color:'var(--ro)'}}>{fmt(stats.due)}</span></div>
      <div className="crd" style={{flex:1,padding:'12px 18px',display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{color:'var(--ts)',fontSize:13}}>Collected</span><span style={{fontSize:20,fontWeight:900,color:'var(--em)'}}>{fmt(stats.coll)}</span></div>
      <div className="crd" style={{flex:1,padding:'12px 18px',display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{color:'var(--ts)',fontSize:13}}>Remaining</span><span style={{fontSize:20,fontWeight:900,color:'var(--rb)'}}>{fmt(stats.due-stats.coll)}</span></div>
    </div>
    <div className="crd" style={{padding:0,overflow:'hidden'}}><div className="tbw"><table className="tbl"><thead><tr>
      <th>#</th><th>Member</th><th>Location</th><th>Chitti</th><th>RD</th><th>Total</th><th>Paid</th><th>Status</th><th>Action</th>
    </tr></thead><tbody>
      {rows.length===0?<tr><td colSpan={9} style={{textAlign:'center',padding:36,color:'var(--ts)'}}>No members</td></tr>
      :rows.map((r,i)=>{const pa=r.pay?Number(r.pay.chittiAmount||0)+Number(r.pay.rdAmount||0):0;return(
        <tr key={r.member.id}>
          <td style={{color:'var(--ts)',fontSize:12}}>{i+1}</td>
          <td><div style={{fontWeight:700,color:'var(--g)',fontSize:14,cursor:'pointer'}} onClick={()=>nav('detail',r.member.id)}>{cap(r.member.name)}</div>{r.member.nickname&&<div style={{fontSize:10,color:'var(--tl)'}}>{r.member.nickname}</div>}</td>
          <td style={{color:'var(--ts)',fontSize:12}}>{r.member.location||'—'}</td>
          <td style={{color:'var(--sa)',fontWeight:600,fontSize:13}}>{fmt(r.cd)}</td>
          <td style={{color:'var(--vi)',fontWeight:600,fontSize:13}}>{fmt(r.rd2)}</td>
          <td style={{color:'var(--g)',fontWeight:800,fontSize:14}}>{fmt(r.tot)}</td>
          <td style={{color:pa>0?'var(--em)':'var(--ts)',fontWeight:600,fontSize:13}}>{pa>0?fmt(pa):'—'}</td>
          <td><span className={`bdg bdg-${r.st==='paid'?'p':r.st==='partial'?'pt':'u'}`}>{r.st==='paid'?'✅ Paid':r.st==='partial'?'⚠️ Partial':'❌ Unpaid'}</span></td>
          <td><button className="btn btn-o btn-xs" onClick={()=>setER(r)}>Update</button></td>
        </tr>
      )})}
    </tbody></table></div></div>
    {editRow&&<PMdl row={editRow} month={sel} onSave={(s,a,b)=>savePay(editRow.member.id,s,a,b)} onClose={()=>setER(null)}/>}
  </div>);
}

function PMdl({row,month,onSave,onClose}){
  const [st,setSt]=useState(row.pay?.status||'unpaid');
  const [ca,sCa]=useState(String(row.pay?.chittiAmount||''));
  const [ra,sRa]=useState(String(row.pay?.rdAmount||''));
  const pt=Number(ca||0)+Number(ra||0);
  return(<div className="ov" onClick={onClose}><div className="mdl" onClick={e=>e.stopPropagation()}>
    <div className="mdl-t">💸 Update Payment</div>
    <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:18}}>
      <div style={{width:42,height:42,borderRadius:11,background:'rgba(240,180,41,.15)',border:'1px solid var(--bdb)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,color:'var(--g)',fontSize:15}}>{ini(row.member.name)}</div>
      <div><div style={{fontWeight:700,color:'var(--g)',fontSize:17}}>{cap(row.member.name)}</div><div style={{fontSize:11,color:'var(--ts)'}}>{ml(month)} · Due: {fmt(row.tot)}</div></div>
    </div>
    <div className="fg"><label className="fl">Chitti Paid (₹) <span style={{color:'var(--ts)',fontWeight:400,textTransform:'none',letterSpacing:0}}>— due {fmt(row.cd)}</span></label><input className="fi" type="number" value={ca} onChange={e=>sCa(e.target.value)} placeholder="0"/></div>
    <div className="fg"><label className="fl">RD Paid (₹) <span style={{color:'var(--ts)',fontWeight:400,textTransform:'none',letterSpacing:0}}>— due {fmt(row.rd2)}</span></label><input className="fi" type="number" value={ra} onChange={e=>sRa(e.target.value)} placeholder="0"/></div>
    <div className="fg" style={{marginBottom:4}}><label className="fl">Status</label><select className="fi" value={st} onChange={e=>setSt(e.target.value)}><option value="paid">✅ Paid</option><option value="partial">⚠️ Partial</option><option value="unpaid">❌ Unpaid</option></select></div>
    {pt>0&&<div style={{marginBottom:16,padding:'9px 12px',background:'rgba(6,214,160,.08)',borderRadius:8,fontSize:13}}>
      <span style={{color:'var(--ts)'}}>Recording: </span><span style={{color:'var(--em)',fontWeight:700}}>{fmt(pt)}</span>
      {pt<row.tot&&<span style={{color:'var(--rb)',fontSize:11,marginLeft:8}}>(Balance: {fmt(row.tot-pt)})</span>}
    </div>}
    <div className="mdl-a"><button className="btn btn-gh btn-f" onClick={onClose}>Cancel</button><button className="btn btn-g btn-f" onClick={()=>onSave(st,ca,ra)}>Save</button></div>
  </div></div>);
}

/* App */
function App(){
  const [pg,sPg]=useState('dash');
  const [dt,sDt]=useState(null);
  const [ntf,sNtf]=useState(null);
  // Force re-render key when navigating to same page type
  const [rk,sRk]=useState(0);
  const nav=(p,d)=>{sPg(p);sDt(d??null);sRk(k=>k+1);window.scrollTo({top:0,behavior:'smooth'})};
  const notify=n=>sNtf(n);
  return(<>
    <Hdr nav={nav}/>
    {pg==='dash'&&<Dash key={rk} nav={nav}/>}
    {pg==='add'&&<MForm key={rk} memberId={null} nav={nav} notify={notify}/>}
    {pg==='edit'&&<MForm key={rk} memberId={dt} nav={nav} notify={notify}/>}
    {pg==='detail'&&<MDetail key={rk} memberId={dt} nav={nav} notify={notify}/>}
    {pg==='monthly'&&<Monthly key={rk} nav={nav} notify={notify}/>}
    <Ntf n={ntf} onClose={()=>sNtf(null)}/>
  </>);
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>

.tabs{display:flex;gap:3px;background:var(--bg2);border-radius:11px;padding:4px;border:1px solid var(--bd)}

/* Notification */
function Ntf({n,onClose}){
  useEffect(()=>{if(n){const t=setTimeout(onClose,3200);return()=>clearTimeout(t)}},[n]);
  if(!n)return null;
  return<div className={`ntf ntf-${n.t==='success'?'s':n.t==='error'?'e':'i'}`}><span>{n.t==='success'?'✅':n.t==='error'?'❌':'ℹ️'}</span>{n.m}</div>;
}

/* Confirm */
function Cfm({title,text,onOk,onNo,danger}){
  return(<div className="ov" onClick={onNo}><div className="mdl" onClick={e=>e.stopPropagation()}>
    <div className="mdl-t">{title}</div><div className="mdl-tx">{text}</div>
    <div className="mdl-a"><button className="btn btn-gh btn-f" onClick={onNo}>Cancel</button><button className={`btn ${danger?'btn-r':'btn-g'} btn-f`} onClick={onOk}>Confirm</button></div>
  </div></div>);
}

/* Header */
function Hdr({nav}){
  return(<header className="hdr"><div className="hdr-in">
    <div className="logo" onClick={()=>nav('dash')}><div className="logo-b">Z</div><div><div className="logo-n">Z — CHITTI</div><div className="logo-t">Management Made Simple</div></div></div>
    <div className="hdr-a"><button className="btn btn-gh btn-sm" onClick={()=>nav('monthly')}>📊 Monthly</button><button className="btn btn-g btn-sm" onClick={()=>nav('add')}>＋ Add Member</button></div>
  </div></header>);
}

/* Dashboard */
function Dash({nav}){
  const [members,setM]=useState(DB.g('members'));
  const [chittis,setC]=useState(DB.g('chittis'));
  const [rd,setR]=useState(DB.g('rdEntries'));
  const [payments,setP]=useState(DB.g('payments'));
  const [q,setQ]=useState('');
  const [tab,setTab]=useState('active');

  // Re-read on every render/focus to stay in sync
  useEffect(()=>{
    const sync=()=>{setM(DB.g('members'));setC(DB.g('chittis'));setR(DB.g('rdEntries'));setP(DB.g('payments'))};
    sync();
    window.addEventListener('focus',sync);
    window.addEventListener('storage',sync);
    return()=>{window.removeEventListener('focus',sync);window.removeEventListener('storage',sync)};
  },[]);

  const ct=mId=>chittis.filter(c=>c.memberId===mId).reduce((s,c)=>s+Number(c.amount),0);
  const rt=mId=>rd.filter(r=>r.memberId===mId).reduce((s,r)=>s+Number(r.amount),0);
  const active=members.filter(m=>m.status==='active');
  const c=cm();
  const grand=active.reduce((s,m)=>s+ct(m.id)+rt(m.id),0);
  const coll=payments.filter(p=>p.month===c).reduce((s,p)=>s+Number(p.chittiAmount||0)+Number(p.rdAmount||0),0);
  const paidN=active.filter(m=>{const p=payments.find(pp=>pp.memberId===m.id&&pp.month===c);return p&&p.status==='paid'}).length;
  const overdN=active.length-paidN;

  const filtered=useMemo(()=>{
    const lq=q.toLowerCase().trim();
    return members.filter(m=>{
      if(tab==='active'?m.status!=='active':m.status!=='quit')return false;
      if(!lq)return true;
      return m.name.toLowerCase().includes(lq)||(m.nickname||'').toLowerCase().includes(lq)||(m.location||'').toLowerCase().includes(lq);
    });
  },[members,q,tab]);

  return(<div className="pg">
    <div className="g4" style={{marginBottom:28}}>
      <SC icon="👥" label="Active Members" value={active.length} sub={`${members.filter(m=>m.status==='quit').length} past`} c="#f0b429"/>
      <SC icon="💰" label="Total Portfolio" value={fmt(grand)} sub="All chittis + RD" c="#4895ef"/>
      <SC icon="✅" label="Collected" value={fmt(coll)} sub={ml(c)} c="#06d6a0"/>
      <SC icon="⚠️" label="Pending" value={overdN} sub={`${paidN} paid this month`} c="#ef233c"/>
    </div>
    <div className="crd">
      <div className="sh"><div className="sh-t">Members <span>Directory</span><span className="cp">{filtered.length}</span></div>
        <button className="btn btn-g btn-sm" onClick={()=>nav('add')}>＋ Add</button>
      </div>
      <div className="swrp" style={{marginBottom:14}}><span className="sico">🔍</span>
        <input className="sinp" placeholder="Search by name, nickname, or location…" value={q} onChange={e=>setQ(e.target.value)}/>
      </div>
      <div className="tabs" style={{marginBottom:18}}>
        <button className={`tab ${tab==='active'?'on':''}`} onClick={()=>setTab('active')}>🟢 Active<span className="cp">{members.filter(m=>m.status==='active').length}</span></button>
        <button className={`tab ${tab==='quit'?'on':''}`} onClick={()=>setTab('quit')}>⚫ Past<span className="cp">{members.filter(m=>m.status==='quit').length}</span></button>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:9}}>
        {filtered.length===0?<div className="emp"><div className="emp-i">🔎</div><div className="emp-t">{q?'No results':'No members'}</div></div>
        :filtered.map((m,i)=>{const tc=ct(m.id),tr2=rt(m.id);return(
          <div key={m.id} className="mc sr-a" style={{animationDelay:`${Math.min(i*15,200)}ms`}} onClick={()=>nav('detail',m.id)}>
            <div className="mc-av">{ini(m.name)}</div>
            <div style={{flex:1,minWidth:0}}>
              <div className="mc-nm">{cap(m.name)}</div>
              <div className="mc-sub">
                {m.location&&<span>📍{m.location}</span>}
                {m.nickname&&<span style={{color:'var(--tl)'}}>"{m.nickname}"</span>}
                <span className={`bdg bdg-${m.status==='active'?'a':'q'}`}><span className={`dot dot-${m.status==='active'?'a':'q'}`}></span>{m.status==='active'?'Active':'Quit'}</span>
              </div>
            </div>
            <div className="mc-rt">
              {tc>0&&<div className="ab"><div className="ab-l tg">Chitti</div><div className="ab-v tg">{fmt(tc)}</div></div>}
              {tr2>0&&<div className="ab"><div className="ab-l tv">RD</div><div className="ab-v tv">{fmt(tr2)}</div></div>}
              <div className="ab"><div className="ab-l tro">Total</div><div className="ab-v tro">{fmt(tc+tr2)}</div></div>
            </div>
          </div>
        )})}
      </div>
    </div>
  </div>);
}

function SC({icon,label,value,sub,c}){
  return(<div className="sc" style={{position:'relative'}}>
    <div className="sc-glow" style={{background:c}}></div>
    <div style={{position:'absolute',inset:0,borderRadius:14,border:`1px solid ${c}55`}}></div>

      <div style={{fontSize:26,marginBottom:10}}>{icon}</div>

/* Member Form */
function MForm({memberId,nav,notify}){
  const isE=!!memberId;
  const [f,sF]=useState({name:'',nickname:'',phone:'',location:'',notes:'',status:'active'});
  const [ch,sCh]=useState([{num:'1',amt:''}]);
  const [ra,sRa]=useState('');
  const [er,sEr]=useState({});
  const [dm,sDm]=useState(false);

  useEffect(()=>{
    if(!isE)return;
    const m=DB.g('members').find(x=>x.id===memberId);
    if(!m)return;
    sF({name:m.name,nickname:m.nickname||'',phone:m.phone||'',location:m.location||'',notes:m.notes||'',status:m.status});
    const cs=DB.g('chittis').filter(x=>x.memberId===memberId);
    sCh(cs.length?cs.map(x=>({num:String(x.chittiNumber),amt:String(x.amount)})):[{num:'1',amt:''}]);
    const r=DB.g('rdEntries').find(x=>x.memberId===memberId);
    sRa(r?String(r.amount):'');
  },[memberId]);

  const val=()=>{
    const e={};
    if(!f.name.trim())e.name='Required';
    if(f.phone&&!/^\d{10}$/.test(f.phone.replace(/\s/g,'')))e.phone='10 digits';
    ch.forEach((c,i)=>{if(c.amt&&(isNaN(c.amt)||Number(c.amt)<=0))e[`c${i}`]='Invalid'});
    if(ra&&(isNaN(ra)||Number(ra)<=0))e.rd='Invalid';
    sEr(e);return!Object.keys(e).length;
  };

  const save=()=>{
    if(!val())return;
    const now=new Date().toISOString();
    if(isE){
      DB.s('members',DB.g('members').map(m=>m.id===memberId?{...m,...f,updatedAt:now}:m));
      let aC=DB.g('chittis').filter(c=>c.memberId!==memberId);
      ch.filter(c=>c.amt).forEach((c,i)=>aC.push({id:Date.now()+i,memberId,chittiNumber:c.num||String(i+1),amount:Number(c.amt),createdAt:now}));
      DB.s('chittis',aC);
      let aR=DB.g('rdEntries').filter(r=>r.memberId!==memberId);
      if(ra&&Number(ra)>0)aR.push({id:Date.now(),memberId,amount:Number(ra),createdAt:now});
      DB.s('rdEntries',aR);
      notify({t:'success',m:'Member updated!'});
      nav('detail',memberId);
    } else {
      const nid=DB.nid('members');
      DB.s('members',[...DB.g('members'),{id:nid,...f,name:cap(f.name.trim()),createdAt:now}]);
      let aC=DB.g('chittis');
      ch.filter(c=>c.amt).forEach((c,i)=>aC.push({id:Date.now()+i,memberId:nid,chittiNumber:c.num||String(i+1),amount:Number(c.amt),createdAt:now}));
      DB.s('chittis',aC);
      let aR=DB.g('rdEntries');
      if(ra&&Number(ra)>0)aR.push({id:Date.now(),memberId:nid,amount:Number(ra),createdAt:now});
      DB.s('rdEntries',aR);
      notify({t:'success',m:'Member added!'});
      nav('dash');
    }
  };

  const del=()=>{
    DB.s('members',DB.g('members').filter(m=>m.id!==memberId));
    DB.s('chittis',DB.g('chittis').filter(c=>c.memberId!==memberId));
    DB.s('rdEntries',DB.g('rdEntries').filter(r=>r.memberId!==memberId));
    DB.s('payments',DB.g('payments').filter(p=>p.memberId!==memberId));
    notify({t:'success',m:'Deleted.'});
    nav('dash');
  };

  return(<div className="pg" style={{maxWidth:700}}>
    {dm&&<Cfm danger title="🗑 Delete Member" text={`Delete "${cap(f.name)}" and all data? Cannot be undone.`} onOk={del} onNo={()=>sDm(false)}/>}
    <button className="bk" onClick={()=>nav(isE?'detail':'dash',memberId)}>← Back</button>
    <div style={{margin:'18px 0 26px'}}><h1 style={{fontSize:26,fontWeight:800}} className="tgg">{isE?'Edit Member':'New Member'}</h1>
      <p style={{color:'var(--ts)',fontSize:13,marginTop:4}}>{isE?'Update details':'Add a new chitti member'}</p>
    </div>
    <div className="fsec"><div className="fsec-t">👤 Personal Info</div>
      <div className="g2">
        <div className="fg"><label className="fl">Name *</label><input className={`fi ${er.name?'er':''}`} placeholder="Name" value={f.name} onChange={e=>sF(p=>({...p,name:e.target.value}))}/>{er.name&&<div className="fi-e">{er.name}</div>}</div>
        <div className="fg"><label className="fl">Nickname</label><input className="fi" placeholder="Optional" value={f.nickname} onChange={e=>sF(p=>({...p,nickname:e.target.value}))}/></div>
        <div className="fg"><label className="fl">Phone</label><input className={`fi ${er.phone?'er':''}`} placeholder="10-digit" value={f.phone} onChange={e=>sF(p=>({...p,phone:e.target.value}))}/>{er.phone&&<div className="fi-e">{er.phone}</div>}</div>
        <div className="fg"><label className="fl">Location</label><input className="fi" placeholder="e.g. TPT, C/O Basheer" value={f.location} onChange={e=>sF(p=>({...p,location:e.target.value}))}/></div>
      </div>
      {isE&&<div className="fg"><label className="fl">Status</label><select className="fi" value={f.status} onChange={e=>sF(p=>({...p,status:e.target.value}))}><option value="active">Active</option><option value="quit">Quit</option></select></div>}
      <div className="fg" style={{marginBottom:0,marginTop:14}}><label className="fl">Notes</label><textarea className="fi fi-ta" placeholder="Notes…" value={f.notes} onChange={e=>sF(p=>({...p,notes:e.target.value}))}/></div>
    </div>
    <div className="fsec"><div className="fsec-t">🎟 Chitti Details</div>
      {ch.map((c,i)=>(<div className="crow" key={i}>
        <div>{i===0&&<label className="fl">Chitti #</label>}<input className="fi" placeholder="#" value={c.num} onChange={e=>sCh(p=>p.map((x,j)=>j===i?{...x,num:e.target.value}:x))}/></div>
        <div>{i===0&&<label className="fl">Amount (₹)</label>}<input className={`fi ${er[`c${i}`]?'er':''}`} type="number" placeholder="0" value={c.amt} onChange={e=>sCh(p=>p.map((x,j)=>j===i?{...x,amt:e.target.value}:x))}/>{er[`c${i}`]&&<div className="fi-e">{er[`c${i}`]}</div>}</div>
        <div style={{paddingBottom:1}}>{ch.length>1&&<button className="btn btn-r btn-xs" onClick={()=>sCh(p=>p.filter((_,j)=>j!==i))}>✕</button>}</div>
      </div>))}
      <button className="btn btn-o btn-sm" onClick={()=>sCh(p=>[...p,{num:String(p.length+1),amt:''}])}>＋ Add Chitti</button>
    </div>
    <div className="fsec"><div className="fsec-t">💳 RD (Monthly)</div>
      <div className="fg" style={{marginBottom:0}}><label className="fl">RD Amount (₹)</label>
        <input className={`fi ${er.rd?'er':''}`} type="number" placeholder="0" value={ra} onChange={e=>sRa(e.target.value)} style={{maxWidth:280}}/>{er.rd&&<div className="fi-e">{er.rd}</div>}
      </div>
    </div>
    <div style={{display:'flex',flexDirection:'column',gap:10}}>
      <button className="btn btn-e btn-f" onClick={save}>{isE?'✅ Update':'✅ Add Member'}</button>
      <button className="btn btn-gh btn-f" onClick={()=>nav(isE?'detail':'dash',memberId)}>Cancel</button>
      {isE&&<button className="btn btn-r btn-f" onClick={()=>sDm(true)}>🗑 Delete Member</button>}
    </div>
  </div>);
}

/* Monthly Summary */
function Monthly({nav,notify}){
  const [sel,setSel]=useState(cm());
  const [members,setM]=useState([]);
  const [chittis,setC]=useState([]);
  const [rd,setR]=useState([]);
  const [payments,setP]=useState([]);
  const [sort,setSort]=useState('name');
  const [editRow,setER]=useState(null);
  const [sq,setSq]=useState('');

  useEffect(()=>{
    const sync=()=>{setM(DB.g('members').filter(m=>m.status==='active'));setC(DB.g('chittis'));setR(DB.g('rdEntries'));setP(DB.g('payments'))};
    sync();
    window.addEventListener('focus',sync);
    return()=>window.removeEventListener('focus',sync);
  },[]);

  const months=useMemo(()=>{const r=[];const n=new Date();for(let i=0;i<24;i++){const d=new Date(n.getFullYear(),n.getMonth()-i,1);r.push(d.toISOString().slice(0,7))}return r},[]);

  const ct=mId=>chittis.filter(c=>c.memberId===mId).reduce((s,c)=>s+Number(c.amount),0);
  const rt=mId=>rd.filter(r=>r.memberId===mId).reduce((s,r)=>s+Number(r.amount),0);
  const gP=mId=>payments.find(p=>p.memberId===mId&&p.month===sel);

  const rows=useMemo(()=>{
    const lq=sq.toLowerCase().trim();
    let r=members
      .filter(m=>!lq||(m.name.toLowerCase().includes(lq)||(m.location||'').toLowerCase().includes(lq)||(m.nickname||'').toLowerCase().includes(lq)))
      .map(m=>{const p=gP(m.id),cd=ct(m.id),rd2=rt(m.id),tot=cd+rd2,st=p?p.status:'unpaid';return{member:m,cd,rd2,tot,pay:p,st}});
    if(sort==='name')r.sort((a,b)=>a.member.name.localeCompare(b.member.name));
    else if(sort==='status'){const o={paid:0,partial:1,unpaid:2};r.sort((a,b)=>o[a.st]-o[b.st])}
    else if(sort==='amt')r.sort((a,b)=>b.tot-a.tot);
    return r;
  },[members,chittis,rd,payments,sel,sort,sq]);

  const stats=useMemo(()=>({total:rows.length,paid:rows.filter(r=>r.st==='paid').length,partial:rows.filter(r=>r.st==='partial').length,unpaid:rows.filter(r=>r.st==='unpaid').length,
    coll:rows.reduce((s,r)=>s+(r.pay?Number(r.pay.chittiAmount||0)+Number(r.pay.rdAmount||0):0),0),
    due:rows.reduce((s,r)=>s+r.tot,0)}),[rows]);

  const savePay=(mId,status,ca,ra)=>{
    let all=DB.g('payments');
    const ex=all.find(p=>p.memberId===mId&&p.month===sel);
    if(ex)all=all.map(p=>p.id===ex.id?{...p,status,chittiAmount:Number(ca||0),rdAmount:Number(ra||0),updatedAt:new Date().toISOString()}:p);
    else all.push({id:Date.now(),memberId:mId,month:sel,chittiAmount:Number(ca||0),rdAmount:Number(ra||0),status,createdAt:new Date().toISOString()});
    DB.s('payments',all);
    setP(DB.g('payments'));
    setER(null);
    notify({t:'success',m:'Payment updated!'});
  };

  return(<div className="pg">
    <button className="bk" onClick={()=>nav('dash')}>← Dashboard</button>
    <div style={{margin:'18px 0 24px'}}><h1 style={{fontSize:26,fontWeight:800}} className="tgg">Monthly Summary</h1>
      <p style={{color:'var(--ts)',fontSize:13,marginTop:4}}>Track and update payment status</p>
    </div>
    <div style={{display:'flex',gap:10,marginBottom:20,flexWrap:'wrap',alignItems:'center'}}>
      <select className="msel" value={sel} onChange={e=>setSel(e.target.value)}>{months.map(m=><option key={m} value={m}>{ml(m)}</option>)}</select>
      <select className="msel" value={sort} onChange={e=>setSort(e.target.value)}><option value="name">A–Z</option><option value="status">Status</option><option value="amt">Amount</option></select>
      <div style={{flex:1,minWidth:180,position:'relative'}}><span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'var(--ts)',fontSize:14}}>🔍</span>
        <input className="msel" style={{paddingLeft:34,width:'100%'}} placeholder="Search…" value={sq} onChange={e=>setSq(e.target.value)}/></div>
    </div>
    <div className="g4" style={{marginBottom:18}}>
      <div className="crd" style={{textAlign:'center',padding:16}}><div style={{fontSize:26,fontWeight:900,color:'var(--sa)'}}>{stats.total}</div><div style={{fontSize:11,color:'var(--ts)',marginTop:3}}>Total</div></div>
      <div className="crd" style={{textAlign:'center',padding:16}}><div style={{fontSize:26,fontWeight:900,color:'var(--em)'}}>{stats.paid}</div><div style={{fontSize:11,color:'var(--ts)',marginTop:3}}>✅ Paid</div></div>
      <div className="crd" style={{textAlign:'center',padding:16}}><div style={{fontSize:26,fontWeight:900,color:'var(--g)'}}>{stats.partial}</div><div style={{fontSize:11,color:'var(--ts)',marginTop:3}}>⚠️ Partial</div></div>
      <div className="crd" style={{textAlign:'center',padding:16}}><div style={{fontSize:26,fontWeight:900,color:'var(--rb)'}}>{stats.unpaid}</div><div style={{fontSize:11,color:'var(--ts)',marginTop:3}}>❌ Unpaid</div></div>
    </div>
    <div style={{display:'flex',gap:12,marginBottom:20,flexWrap:'wrap'}}>
      <div className="crd" style={{flex:1,padding:'12px 18px',display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{color:'var(--ts)',fontSize:13}}>Due</span><span style={{fontSize:20,fontWeight:900,color:'var(--ro)'}}>{fmt(stats.due)}</span></div>
      <div className="crd" style={{flex:1,padding:'12px 18px',display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{color:'var(--ts)',fontSize:13}}>Collected</span><span style={{fontSize:20,fontWeight:900,color:'var(--em)'}}>{fmt(stats.coll)}</span></div>
      <div className="crd" style={{flex:1,padding:'12px 18px',display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{color:'var(--ts)',fontSize:13}}>Remaining</span><span style={{fontSize:20,fontWeight:900,color:'var(--rb)'}}>{fmt(stats.due-stats.coll)}</span></div>
    </div>
    <div className="crd" style={{padding:0,overflow:'hidden'}}><div className="tbw"><table className="tbl"><thead><tr>
      <th>#</th><th>Member</th><th>Location</th><th>Chitti</th><th>RD</th><th>Total</th><th>Paid</th><th>Status</th><th>Action</th>
    </tr></thead><tbody>
      {rows.length===0?<tr><td colSpan={9} style={{textAlign:'center',padding:36,color:'var(--ts)'}}>No members</td></tr>
      :rows.map((r,i)=>{const pa=r.pay?Number(r.pay.chittiAmount||0)+Number(r.pay.rdAmount||0):0;return(
        <tr key={r.member.id}>
          <td style={{color:'var(--ts)',fontSize:12}}>{i+1}</td>
          <td><div style={{fontWeight:700,color:'var(--g)',fontSize:14,cursor:'pointer'}} onClick={()=>nav('detail',r.member.id)}>{cap(r.member.name)}</div>{r.member.nickname&&<div style={{fontSize:10,color:'var(--tl)'}}>{r.member.nickname}</div>}</td>
          <td style={{color:'var(--ts)',fontSize:12}}>{r.member.location||'—'}</td>
          <td style={{color:'var(--sa)',fontWeight:600,fontSize:13}}>{fmt(r.cd)}</td>
          <td style={{color:'var(--vi)',fontWeight:600,fontSize:13}}>{fmt(r.rd2)}</td>
          <td style={{color:'var(--g)',fontWeight:800,fontSize:14}}>{fmt(r.tot)}</td>
          <td style={{color:pa>0?'var(--em)':'var(--ts)',fontWeight:600,fontSize:13}}>{pa>0?fmt(pa):'—'}</td>
          <td><span className={`bdg bdg-${r.st==='paid'?'p':r.st==='partial'?'pt':'u'}`}>{r.st==='paid'?'✅ Paid':r.st==='partial'?'⚠️ Partial':'❌ Unpaid'}</span></td>
          <td><button className="btn btn-o btn-xs" onClick={()=>setER(r)}>Update</button></td>
        </tr>
      )})}
    </tbody></table></div></div>
    {editRow&&<PMdl row={editRow} month={sel} onSave={(s,a,b)=>savePay(editRow.member.id,s,a,b)} onClose={()=>setER(null)}/>}
  </div>);
}

function PMdl({row,month,onSave,onClose}){
  const [st,setSt]=useState(row.pay?.status||'unpaid');
  const [ca,sCa]=useState(String(row.pay?.chittiAmount||''));
  const [ra,sRa]=useState(String(row.pay?.rdAmount||''));
  const pt=Number(ca||0)+Number(ra||0);
  return(<div className="ov" onClick={onClose}><div className="mdl" onClick={e=>e.stopPropagation()}>
    <div className="mdl-t">💸 Update Payment</div>
    <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:18}}>
      <div style={{width:42,height:42,borderRadius:11,background:'rgba(240,180,41,.15)',border:'1px solid var(--bdb)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,color:'var(--g)',fontSize:15}}>{ini(row.member.name)}</div>
      <div><div style={{fontWeight:700,color:'var(--g)',fontSize:17}}>{cap(row.member.name)}</div><div style={{fontSize:11,color:'var(--ts)'}}>{ml(month)} · Due: {fmt(row.tot)}</div></div>
    </div>
    <div className="fg"><label className="fl">Chitti Paid (₹) <span style={{color:'var(--ts)',fontWeight:400,textTransform:'none',letterSpacing:0}}>— due {fmt(row.cd)}</span></label><input className="fi" type="number" value={ca} onChange={e=>sCa(e.target.value)} placeholder="0"/></div>
    <div className="fg"><label className="fl">RD Paid (₹) <span style={{color:'var(--ts)',fontWeight:400,textTransform:'none',letterSpacing:0}}>— due {fmt(row.rd2)}</span></label><input className="fi" type="number" value={ra} onChange={e=>sRa(e.target.value)} placeholder="0"/></div>
    <div className="fg" style={{marginBottom:4}}><label className="fl">Status</label><select className="fi" value={st} onChange={e=>setSt(e.target.value)}><option value="paid">✅ Paid</option><option value="partial">⚠️ Partial</option><option value="unpaid">❌ Unpaid</option></select></div>
    {pt>0&&<div style={{marginBottom:16,padding:'9px 12px',background:'rgba(6,214,160,.08)',borderRadius:8,fontSize:13}}>
      <span style={{color:'var(--ts)'}}>Recording: </span><span style={{color:'var(--em)',fontWeight:700}}>{fmt(pt)}</span>
      {pt<row.tot&&<span style={{color:'var(--rb)',fontSize:11,marginLeft:8}}>(Balance: {fmt(row.tot-pt)})</span>}
    </div>}
    <div className="mdl-a"><button className="btn btn-gh btn-f" onClick={onClose}>Cancel</button><button className="btn btn-g btn-f" onClick={()=>onSave(st,ca,ra)}>Save</button></div>
  </div></div>);
}

/* App */
function App(){
  const [pg,sPg]=useState('dash');
  const [dt,sDt]=useState(null);
  const [ntf,sNtf]=useState(null);
  // Force re-render key when navigating to same page type
  const [rk,sRk]=useState(0);
  const nav=(p,d)=>{sPg(p);sDt(d??null);sRk(k=>k+1);window.scrollTo({top:0,behavior:'smooth'})};
  const notify=n=>sNtf(n);
  return(<>
    <Hdr nav={nav}/>
    {pg==='dash'&&<Dash key={rk} nav={nav}/>}
    {pg==='add'&&<MForm key={rk} memberId={null} nav={nav} notify={notify}/>}
    {pg==='edit'&&<MForm key={rk} memberId={dt} nav={nav} notify={notify}/>}
    {pg==='detail'&&<MDetail key={rk} memberId={dt} nav={nav} notify={notify}/>}
    {pg==='monthly'&&<Monthly key={rk} nav={nav} notify={notify}/>}
    <Ntf n={ntf} onClose={()=>sNtf(null)}/>
  </>);
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
