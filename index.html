// ─── Member Form (Add / Edit) ─────────────────────────────────────────────────
function MemberForm({ memberId, onNav, notify }) {
  const isEdit = !!memberId;
  const [form, setForm] = useState({ name:'', nickname:'', phone:'', location:'', notes:'', status:'active' });
  const [chittis, setChittis] = useState([{ chittiNumber:'1', amount:'' }]);
  const [rdAmount, setRdAmount] = useState('');
  const [errors, setErrors] = useState({});
  const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);

  useEffect(() => {
    if (isEdit) {
      const m = DB.get('members').find(x=>x.id===memberId);
      if (m) {
        setForm({ name:m.name, nickname:m.nickname||'', phone:m.phone||'', location:m.location||'', notes:m.notes||'', status:m.status });
        const c = DB.get('chittis').filter(x=>x.memberId===memberId);
        setChittis(c.length ? c.map(x=>({chittiNumber:String(x.chittiNumber),amount:String(x.amount)})) : [{chittiNumber:'1',amount:''}]);
        const r = DB.get('rdEntries').find(x=>x.memberId===memberId);
        setRdAmount(r ? String(r.amount) : '');
      }
    }
  }, [memberId]);

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = 'Member name is required';
    if (form.phone && !/^[0-9]{10}$/.test(form.phone.replace(/\s/g,''))) e.phone = 'Phone must be 10 digits';
    chittis.forEach((c,i) => {
      if (c.amount && (isNaN(c.amount) || Number(c.amount) <= 0)) e[`chitti_${i}`] = 'Amount must be positive';
    });
    if (rdAmount && (isNaN(rdAmount) || Number(rdAmount) <= 0)) e.rd = 'RD amount must be positive';
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const handleSubmit = () => {
    if (!validate()) return;
    if (isEdit) {
      const members = DB.get('members').map(m => m.id===memberId ? {...m,...form,updatedAt:new Date().toISOString()} : m);
      DB.set('members', members);
      // Chittis
      let allChittis = DB.get('chittis').filter(c=>c.memberId!==memberId);
      chittis.filter(c=>c.amount).forEach((c,i) => {
        allChittis.push({ id: Date.now()+i, memberId, chittiNumber:Number(c.chittiNumber)||i+1, amount:Number(c.amount), createdAt:new Date().toISOString() });
      });
      DB.set('chittis', allChittis);
      // RD
      let allRd = DB.get('rdEntries').filter(r=>r.memberId!==memberId);
      if (rdAmount && Number(rdAmount)>0) allRd.push({ id:Date.now(), memberId, amount:Number(rdAmount), createdAt:new Date().toISOString() });
      DB.set('rdEntries', allRd);
      notify({ type:'success', msg:'Member updated successfully!' });
      onNav('memberDetail', memberId);
    } else {
      const newId = DB.nextId('members');
      const members = [...DB.get('members'), { id:newId, ...form, name:cap(form.name.trim()), createdAt:new Date().toISOString() }];
      DB.set('members', members);
      let allChittis = DB.get('chittis');
      chittis.filter(c=>c.amount).forEach((c,i) => {
        allChittis.push({ id: Date.now()+i, memberId:newId, chittiNumber:Number(c.chittiNumber)||i+1, amount:Number(c.amount), createdAt:new Date().toISOString() });
      });
      DB.set('chittis', allChittis);
      let allRd = DB.get('rdEntries');
      if (rdAmount && Number(rdAmount)>0) allRd.push({ id:Date.now(), memberId:newId, amount:Number(rdAmount), createdAt:new Date().toISOString() });
      DB.set('rdEntries', allRd);
      notify({ type:'success', msg:'Member added successfully!' });
      onNav('dashboard');
    }
  };

  const handleDelete = () => {
    DB.set('members', DB.get('members').filter(m=>m.id!==memberId));
    DB.set('chittis', DB.get('chittis').filter(c=>c.memberId!==memberId));
    DB.set('rdEntries', DB.get('rdEntries').filter(r=>r.memberId!==memberId));
    DB.set('payments', DB.get('payments').filter(p=>p.memberId!==memberId));
    notify({ type:'success', msg:'Member deleted.' });
    onNav('dashboard');
  };

  const addChitti = () => setChittis(prev => [...prev, { chittiNumber:String(prev.length+1), amount:'' }]);
  const removeChitti = (i) => setChittis(prev => prev.filter((_,idx)=>idx!==i));
  const updateChitti = (i, field, val) => setChittis(prev => prev.map((c,idx)=>idx===i?{...c,[field]:val}:c));

  return (
    <div className="page" style={{maxWidth:720}}>
      {showDeleteConfirm && (
        <ConfirmModal title="🗑 Delete Member" danger
          text={`Are you sure you want to delete "${cap(form.name)}"? This will remove all their chittis, RD entries and payments. This cannot be undone.`}
          onConfirm={handleDelete} onCancel={()=>setShowDeleteConfirm(false)} />
      )}
      <button className="back-btn" onClick={()=>onNav(isEdit?'memberDetail':'dashboard', memberId)}>← Back</button>
      <div style={{marginTop:20,marginBottom:28}}>
        <h1 style={{fontSize:28,fontWeight:800,marginBottom:4}} className="text-gold-grad">{isEdit?'Edit Member':'Add New Member'}</h1>
        <p style={{color:'var(--text-secondary)',fontSize:14}}>{isEdit?'Update member information':'Fill in the details to add a new chitti member'}</p>
      </div>

      <div className="form-section">
        <div className="form-section-title">👤 Personal Information</div>
        <div className="grid-2">
          <div className="form-group">
            <label className="form-label">Member Name *</label>
            <input className={`form-input ${errors.name?'error':''}`} placeholder="Enter member name"
              value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} />
            {errors.name && <div className="form-error">{errors.name}</div>}
          </div>
          <div className="form-group">
            <label className="form-label">Nickname</label>
            <input className="form-input" placeholder="Enter nickname (optional)"
              value={form.nickname} onChange={e=>setForm(f=>({...f,nickname:e.target.value}))} />
          </div>
          <div className="form-group">
            <label className="form-label">Phone Number</label>
            <input className={`form-input ${errors.phone?'error':''}`} placeholder="10-digit number for WhatsApp"
              value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))} />
            {errors.phone && <div className="form-error">{errors.phone}</div>}
          </div>
          <div className="form-group">
            <label className="form-label">Location</label>
            <input className="form-input" placeholder="Enter location (optional)"
              value={form.location} onChange={e=>setForm(f=>({...f,location:e.target.value}))} />
          </div>
        </div>
        {isEdit && (
          <div className="form-group">
            <label className="form-label">Status</label>
            <select className="form-input" value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))}>
              <option value="active">Active</option>
              <option value="quit">Quit</option>
            </select>
          </div>
        )}
        <div className="form-group" style={{marginBottom:0}}>
          <label className="form-label">Notes</label>
          <textarea className="form-input form-textarea" placeholder="Add any notes..."
            value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} />
        </div>
      </div>

      <div className="form-section">
        <div className="form-section-title">🎟 Chitti Details</div>
        {chittis.map((c,i) => (
          <div className="chitti-row" key={i}>
            <div>
              <label className="form-label">Chitti #</label>
              <input className="form-input" placeholder="Number" value={c.chittiNumber}
                onChange={e=>updateChitti(i,'chittiNumber',e.target.value)} />
            </div>
            <div>
              <label className="form-label">Amount (₹)</label>
              <input className={`form-input ${errors[`chitti_${i}`]?'error':''}`} placeholder="0"
                type="number" value={c.amount} onChange={e=>updateChitti(i,'amount',e.target.value)} />
              {errors[`chitti_${i}`] && <div className="form-error">{errors[`chitti_${i}`]}</div>}
            </div>
            <div>
              {chittis.length > 1 && (
                <button className="btn btn-ruby btn-sm" style={{marginTop:22}} onClick={()=>removeChitti(i)}>✕</button>
              )}
            </div>
          </div>
        ))}
        <button className="btn btn-outline-gold btn-sm" onClick={addChitti}>＋ Add Chitti</button>
      </div>

      <div className="form-section">
        <div className="form-section-title">💳 RD (Recurring Deposit)</div>
        <div className="form-group" style={{marginBottom:0}}>
          <label className="form-label">Monthly RD Amount (₹)</label>
          <input className={`form-input ${errors.rd?'error':''}`} placeholder="0" type="number"
            value={rdAmount} onChange={e=>setRdAmount(e.target.value)} style={{maxWidth:300}} />
          {errors.rd && <div className="form-error">{errors.rd}</div>}
        </div>
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        <button className="btn btn-emerald btn-full" onClick={handleSubmit}>
          {isEdit ? '✅ Update Member' : '✅ Add Member'}
        </button>
        <button className="btn btn-ghost btn-full" onClick={()=>onNav(isEdit?'memberDetail':'dashboard', memberId)}>Cancel</button>
        {isEdit && <button className="btn btn-ruby btn-full" onClick={()=>setShowDeleteConfirm(true)}>🗑 Delete Member</button>}
      </div>
    </div>
  );
}

// ─── Monthly Summary ──────────────────────────────────────────────────────────
function MonthlySummary({ onNav, notify }) {
  const [selectedMonth, setSelectedMonth] = useState(curMonth());
  const [members, setMembers] = useState([]);
  const [chittis, setChittis] = useState([]);
  const [rdEntries, setRdEntries] = useState([]);
  const [payments, setPayments] = useState([]);
  const [editingPayment, setEditingPayment] = useState(null);
  const [sortBy, setSortBy] = useState('name');

  useEffect(() => {
    setMembers(DB.get('members').filter(m=>m.status==='active'));
    setChittis(DB.get('chittis'));
    setRdEntries(DB.get('rdEntries'));
    setPayments(DB.get('payments'));
  }, []);

  const months = useMemo(() => {
    const result = [];
    const now = new Date();
    for (let i = 0; i < 12; i++) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      result.push(d.toISOString().slice(0,7));
    }
    return result;
  }, []);

  const getChittiTotal = (mId) => chittis.filter(c=>c.memberId===mId).reduce((a,c)=>a+Number(c.amount),0);
  const getRdTotal = (mId) => rdEntries.filter(r=>r.memberId===mId).reduce((a,r)=>a+Number(r.amount),0);
  const getPayment = (mId) => payments.find(p=>p.memberId===mId && p.month===selectedMonth);

  const rows = useMemo(() => {
    return members.map(m => {
      const p = getPayment(m.id);
      const chittiDue = getChittiTotal(m.id);
      const rdDue = getRdTotal(m.id);
      const total = chittiDue + rdDue;
      const status = p ? p.status : 'unpaid';
      return { member:m, chittiDue, rdDue, total, payment:p, status };
    }).sort((a,b) => {
      if (sortBy==='name') return a.member.name.localeCompare(b.member.name);
      if (sortBy==='status') { const o={paid:0,partial:1,unpaid:2}; return o[a.status]-o[b.status]; }
      if (sortBy==='amount') return b.total-a.total;
      return 0;
    });
  }, [members, chittis, rdEntries, payments, selectedMonth, sortBy]);

  const stats = useMemo(() => ({
    total: rows.length,
    paid: rows.filter(r=>r.status==='paid').length,
    partial: rows.filter(r=>r.status==='partial').length,
    unpaid: rows.filter(r=>r.status==='unpaid').length,
    collected: rows.reduce((a,r)=>a+(r.payment?Number(r.payment.chittiAmount||0)+Number(r.payment.rdAmount||0):0),0),
  }), [rows]);

  const updatePaymentStatus = (mId, status, chittiAmount, rdAmount) => {
    let all = DB.get('payments');
    const existing = all.find(p=>p.memberId===mId && p.month===selectedMonth);
    if (existing) {
      all = all.map(p => p.id===existing.id ? {...p, status, chittiAmount:Number(chittiAmount||0), rdAmount:Number(rdAmount||0), updatedAt:new Date().toISOString()} : p);
    } else {
      all.push({ id:Date.now(), memberId:mId, month:selectedMonth, chittiAmount:Number(chittiAmount||0), rdAmount:Number(rdAmount||0), status, createdAt:new Date().toISOString() });
    }
    DB.set('payments', all);
    setPayments(DB.get('payments'));
    setEditingPayment(null);
    notify({ type:'success', msg:'Payment updated!' });
  };

  return (
    <div className="page">
      <button className="back-btn" onClick={()=>onNav('dashboard')}>← Back to Dashboard</button>
      <div style={{marginTop:20,marginBottom:28}}>
        <h1 style={{fontSize:28,fontWeight:800}} className="text-gold-grad">Monthly Summary</h1>
        <p style={{color:'var(--text-secondary)',fontSize:14,marginTop:4}}>Track payment status for all active members</p>
      </div>

      {/* Month selector + sort */}
      <div style={{display:'flex',gap:12,marginBottom:24,flexWrap:'wrap',alignItems:'center'}}>
        <select className="month-select" value={selectedMonth} onChange={e=>setSelectedMonth(e.target.value)}>
          {months.map(m=><option key={m} value={m}>{monthLabel(m)}</option>)}
        </select>
        <select className="month-select" value={sortBy} onChange={e=>setSortBy(e.target.value)}>
          <option value="name">Sort: Name</option>
          <option value="status">Sort: Status</option>
          <option value="amount">Sort: Amount</option>
        </select>
      </div>

      {/* Stats */}
      <div className="grid-4" style={{marginBottom:24}}>
        <div className="card" style={{textAlign:'center',padding:16}}>
          <div style={{fontSize:28,fontWeight:800,color:'var(--sapphire)'}}>{stats.total}</div>
          <div style={{fontSize:12,color:'var(--text-secondary)',marginTop:4}}>Total Members</div>
        </div>
        <div className="card" style={{textAlign:'center',padding:16}}>
          <div style={{fontSize:28,fontWeight:800,color:'var(--emerald)'}}>{stats.paid}</div>
          <div style={{fontSize:12,color:'var(--text-secondary)',marginTop:4}}>✅ Paid</div>
        </div>
        <div className="card" style={{textAlign:'center',padding:16}}>
          <div style={{fontSize:28,fontWeight:800,color:'var(--gold-primary)'}}>{stats.partial}</div>
          <div style={{fontSize:12,color:'var(--text-secondary)',marginTop:4}}>⚠️ Partial</div>
        </div>
        <div className="card" style={{textAlign:'center',padding:16}}>
          <div style={{fontSize:28,fontWeight:800,color:'var(--ruby)'}}>{stats.unpaid}</div>
          <div style={{fontSize:12,color:'var(--text-secondary)',marginTop:4}}>❌ Unpaid</div>
        </div>
      </div>
      <div className="card" style={{marginBottom:20,padding:'12px 20px',textAlign:'center'}}>
        <span style={{color:'var(--text-secondary)',fontSize:13}}>Total Collected: </span>
        <span style={{fontSize:20,fontWeight:800,color:'var(--emerald)'}}>{fmt(stats.collected)}</span>
      </div>

      {/* Table */}
      <div className="card" style={{padding:0,overflow:'hidden'}}>
        <div style={{overflowX:'auto'}}>
          <table className="pay-table">
            <thead>
              <tr>
                <th>Member</th>
                <th>Chitti Due</th>
                <th>RD Due</th>
                <th>Total</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              {rows.length===0 ? (
                <tr><td colSpan={6} style={{textAlign:'center',padding:40,color:'var(--text-muted)'}}>No active members</td></tr>
              ) : rows.map(r => (
                <tr key={r.member.id}>
                  <td>
                    <div style={{fontWeight:700,color:'var(--gold-primary)',fontSize:15}}>{cap(r.member.name)}</div>
                    {r.member.location && <div style={{fontSize:11,color:'var(--text-muted)'}}>{r.member.location}</div>}
                  </td>
                  <td style={{color:'var(--sapphire)',fontWeight:600}}>{fmt(r.chittiDue)}</td>
                  <td style={{color:'var(--violet)',fontWeight:600}}>{fmt(r.rdDue)}</td>
                  <td style={{color:'var(--gold-primary)',fontWeight:800,fontSize:16}}>{fmt(r.total)}</td>
                  <td>
                    <span className={`status-badge badge-${r.status}`}>
                      {r.status==='paid'?'✅ Paid':r.status==='partial'?'⚠️ Partial':'❌ Unpaid'}
                    </span>
                  </td>
                  <td>
                    <button className="btn btn-outline-gold btn-sm" onClick={()=>setEditingPayment(r)}>Update</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* Payment update modal */}
      {editingPayment && (
        <PaymentModal row={editingPayment} month={selectedMonth}
          onSave={(status,ca,ra) => updatePaymentStatus(editingPayment.member.id, status, ca, ra)}
          onClose={()=>setEditingPayment(null)} />
      )}
    </div>
  );
}

function PaymentModal({ row, month, onSave, onClose }) {
  const [status, setStatus] = useState(row.payment?.status || 'unpaid');
  const [ca, setCa] = useState(String(row.payment?.chittiAmount||row.chittiDue||''));
  const [ra, setRa] = useState(String(row.payment?.rdAmount||row.rdDue||''));

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">💸 Update Payment</div>
        <div style={{color:'var(--gold-primary)',fontWeight:700,fontSize:18,marginBottom:4}}>{cap(row.member.name)}</div>
        <div style={{color:'var(--text-secondary)',fontSize:13,marginBottom:20}}>{monthLabel(month)}</div>

        <div className="form-group">
          <label className="form-label">Chitti Amount Paid (₹)</label>
          <input className="form-input" type="number" value={ca} onChange={e=>setCa(e.target.value)} placeholder="0" />
          <div style={{fontSize:11,color:'var(--text-muted)',marginTop:4}}>Due: {fmt(row.chittiDue)}</div>
        </div>
        <div className="form-group">
          <label className="form-label">RD Amount Paid (₹)</label>
          <input className="form-input" type="number" value={ra} onChange={e=>setRa(e.target.value)} placeholder="0" />
          <div style={{fontSize:11,color:'var(--text-muted)',marginTop:4}}>Due: {fmt(row.rdDue)}</div>
        </div>
        <div className="form-group">
          <label className="form-label">Payment Status</label>
          <select className="form-input" value={status} onChange={e=>setStatus(e.target.value)}>
            <option value="paid">✅ Paid</option>
            <option value="partial">⚠️ Partial</option>
            <option value="unpaid">❌ Unpaid</option>
          </select>
        </div>
        <div className="modal-actions">
          <button className="btn btn-ghost btn-full" onClick={onClose}>Cancel</button>
          <button className="btn btn-gold btn-full" onClick={()=>onSave(status,ca,ra)}>Save Payment</button>
        </div>
      </div>
    </div>
  );
}

// ─── App Shell ────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('dashboard');
  const [pageData, setPageData] = useState(null);
  const [notif, setNotif] = useState(null);

  const navigate = (p, data) => { setPage(p); setPageData(data||null); window.scrollTo(0,0); };
  const notify = (n) => setNotif(n);

  return (
    <>
      <Header onNav={navigate} />
      {page==='dashboard' && <Dashboard onNav={navigate} notify={notify} />}
      {page==='addMember' && <MemberForm memberId={null} onNav={navigate} notify={notify} />}
      {page==='editMember' && <MemberForm memberId={pageData} onNav={navigate} notify={notify} />}
      {page==='memberDetail' && <MemberDetail memberId={pageData} onNav={navigate} notify={notify} />}
      {page==='monthly' && <MonthlySummary onNav={navigate} notify={notify} />}
      <Notification notif={notif} onClose={()=>setNotif(null)} />
    </>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>

  .form-section {
    background: var(--bg-secondary); border-radius: 12px; padding: 20px;
    border: 1px solid var(--border-gold); margin-bottom: 20px;
  }
  .form-section-title {
    font-size: 13px; font-weight: 700; color: var(--gold-primary);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }

  /* Chitti row in form */
  .chitti-row {
    display: grid; grid-template-columns: 1fr 1fr auto; gap: 12px; align-items: end;
    margin-bottom: 12px; animation: fadeIn 0.2s ease;
  }

  /* Grid layouts */
  .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
  .grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; }
  @media(max-width:1024px) { .grid-4{grid-template-columns:repeat(2,1fr)} .grid-3{grid-template-columns:repeat(2,1fr)} }
  @media(max-width:640px) { .grid-4{grid-template-columns:1fr} .grid-3{grid-template-columns:1fr} .grid-2{grid-template-columns:1fr} .member-amounts{display:none} .header-inner{flex-wrap:wrap} }

  /* Detail Info Row */
  .info-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(245,166,35,0.1); }
  .info-row:last-child { border-bottom: none; }
  .info-icon { font-size: 18px; width: 28px; flex-shrink: 0; text-align: center; }
  .info-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); }
  .info-value { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-top: 2px; }

  /* Divider */
  .divider { height: 1px; background: var(--border-gold); margin: 20px 0; }

  /* Section header */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
  .section-title { font-size: 18px; font-weight: 700; color: var(--text-primary); }
  .section-title span { color: var(--gold-primary); }

  /* Page wrapper */
  .page { padding: 32px 24px; max-width: 1400px; margin: 0 auto; animation: fadeIn 0.3s ease; }

  /* Modal/Overlay */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; padding: 20px; backdrop-filter: blur(4px);
    animation: fadeIn 0.2s ease;
  }
  .modal-box {
    background: var(--bg-card); border: 1px solid var(--border-gold-bright);
    border-radius: 20px; padding: 32px; max-width: 480px; width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), var(--shadow-gold-strong);
    animation: fadeIn 0.3s ease;
  }
  .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 12px; }
  .modal-text { font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.6; }
  .modal-actions { display: flex; gap: 12px; }

  /* Payment table */
  .pay-table { width: 100%; border-collapse: collapse; }
  .pay-table th {
    text-align: left; padding: 12px 16px; font-size: 11px;
    text-transform: uppercase; letter-spacing: 1px; color: var(--gold-primary);
    border-bottom: 1px solid var(--border-gold); background: var(--bg-secondary);
  }
  .pay-table td { padding: 14px 16px; border-bottom: 1px solid rgba(245,166,35,0.08); font-size: 14px; vertical-align: middle; }
  .pay-table tr:hover td { background: var(--bg-card-hover); }

  /* Month selector */
  .month-select {
    padding: 10px 16px; background: var(--bg-card); border: 1.5px solid var(--border-gold);
    border-radius: 10px; color: var(--text-primary); font-family: 'Inter', sans-serif;
    font-size: 14px; outline: none; cursor: pointer;
  }
  .month-select:focus { border-color: var(--gold-primary); }
  .month-select option { background: var(--bg-card); }

  /* Gradient texts */
  .text-gold { color: var(--gold-primary); }
  .text-gold-grad {
    background: linear-gradient(90deg, var(--gold-secondary), var(--amber));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .text-emerald { color: var(--emerald); }
  .text-ruby { color: var(--ruby); }
  .text-sapphire { color: var(--sapphire); }
  .text-violet { color: var(--violet); }
  .text-rose { color: var(--rose); }

  /* Glow number */
  .glow-number {
    font-size: 42px; font-weight: 900; line-height: 1;
    filter: drop-shadow(0 0 8px currentColor);
  }

  /* Empty state */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.5; }
  .empty-text { font-size: 16px; font-weight: 500; }
  .empty-sub { font-size: 13px; margin-top: 6px; }

  /* Notification */
  .notification {
    position: fixed; bottom: 24px; right: 24px; z-index: 9999;
    padding: 14px 20px; border-radius: 12px; font-size: 14px; font-weight: 600;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5); animation: slideIn 0.3s ease;
    display: flex; align-items: center; gap: 10px; max-width: 360px;
  }
  .notif-success { background: #00b377; color: #fff; }
  .notif-error { background: var(--ruby); color: #fff; }
  .notif-info { background: var(--gold-dim); color: #fff; }

  /* Back btn */
  .back-btn {
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--text-secondary); font-size: 14px; cursor: pointer;
    padding: 8px 0; border: none; background: none;
    transition: color 0.2s; font-family: 'Inter', sans-serif;
  }
  .back-btn:hover { color: var(--gold-primary); }

  /* Responsive table */
  @media(max-width:768px) {
    .pay-table th:nth-child(3), .pay-table td:nth-child(3) { display: none; }
    .chitti-row { grid-template-columns: 1fr 1fr auto; }
    .page { padding: 20px 16px; }
  }
  @media(max-width:500px) {
    .pay-table th:nth-child(2), .pay-table td:nth-child(2) { display: none; }
    .modal-actions { flex-direction: column; }
  }

  /* Shimmer loader */
  .shimmer {
    background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-hover) 50%, var(--bg-card) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 8px; height: 20px;
  }

  /* Payment input */
  .pay-input {
    padding: 8px 12px; background: var(--bg-secondary);
    border: 1px solid var(--border-gold); border-radius: 8px;
    color: var(--text-primary); font-family: 'Inter', sans-serif; font-size: 13px;
    width: 120px; outline: none;
  }
  .pay-input:focus { border-color: var(--gold-primary); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;

// ─── Data Store (localStorage) ───────────────────────────────────────────────
const DB = {
  get: (key) => { try { return JSON.parse(localStorage.getItem('zchitti_'+key)) || []; } catch { return []; } },
  set: (key, val) => localStorage.setItem('zchitti_'+key, JSON.stringify(val)),
  nextId: (key) => { const items = DB.get(key); return items.length ? Math.max(...items.map(i=>i.id))+1 : 1; }
};

// ─── Init sample data if empty ────────────────────────────────────────────────
function initSampleData() {
  if (DB.get('members').length) return;
  const members = [
    { id:1, name:'Afreen', nickname:'', phone:'9876543210', location:'TPT', notes:'', status:'active', createdAt: new Date().toISOString() },
    { id:2, name:'Ahmed', nickname:'', phone:'9876543211', location:'BED College', notes:'', status:'active', createdAt: new Date().toISOString() },
    { id:3, name:'Akheel', nickname:'Aki', phone:'9876543212', location:'Hyderabad', notes:'', status:'active', createdAt: new Date().toISOString() },
    { id:4, name:'Yaqub Narmada', nickname:'', phone:'', location:'Narmada', notes:'', status:'quit', createdAt: new Date().toISOString() },
    { id:5, name:'Narsimha Chary TR', nickname:'', phone:'', location:'TR', notes:'', status:'quit', createdAt: new Date().toISOString() },
  ];
  const chittis = [
    { id:1, memberId:1, chittiNumber:1, amount:5000, createdAt: new Date().toISOString() },
    { id:2, memberId:1, chittiNumber:2, amount:6000, createdAt: new Date().toISOString() },
    { id:3, memberId:2, chittiNumber:1, amount:5000, createdAt: new Date().toISOString() },
    { id:4, memberId:3, chittiNumber:1, amount:5000, createdAt: new Date().toISOString() },
  ];
  const rdEntries = [
    { id:1, memberId:1, amount:1000, createdAt: new Date().toISOString() },
    { id:2, memberId:2, amount:500, createdAt: new Date().toISOString() },
  ];
  const curMonth = new Date().toISOString().slice(0,7);
  const payments = [
    { id:1, memberId:1, month:curMonth, chittiAmount:11000, rdAmount:1000, status:'paid', createdAt: new Date().toISOString() },
    { id:2, memberId:2, month:curMonth, chittiAmount:3000, rdAmount:0, status:'partial', createdAt: new Date().toISOString() },
  ];
  DB.set('members', members);
  DB.set('chittis', chittis);
  DB.set('rdEntries', rdEntries);
  DB.set('payments', payments);
}
initSampleData();

// ─── Helpers ──────────────────────────────────────────────────────────────────
const fmt = (n) => '₹' + Number(n||0).toLocaleString('en-IN');
const cap = (s) => s ? s.charAt(0).toUpperCase() + s.slice(1) : '';
const getInitials = (name) => name ? name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2) : '?';
const monthLabel = (ym) => { const [y,m] = ym.split('-'); return new Date(y,m-1,1).toLocaleString('en',{month:'long',year:'numeric'}); };
const curMonth = () => new Date().toISOString().slice(0,7);

// ─── Notification ─────────────────────────────────────────────────────────────
function Notification({ notif, onClose }) {
  useEffect(() => { if (notif) { const t = setTimeout(onClose, 3500); return () => clearTimeout(t); } }, [notif]);
  if (!notif) return null;
  return (
    <div className={`notification notif-${notif.type}`}>
      <span>{notif.type==='success'?'✅':notif.type==='error'?'❌':'ℹ️'}</span>
      <span>{notif.msg}</span>
    </div>
  );
}

// ─── Modal ────────────────────────────────────────────────────────────────────
function ConfirmModal({ title, text, onConfirm, onCancel, danger }) {
  return (
    <div className="modal-overlay" onClick={onCancel}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">{title}</div>
        <div className="modal-text">{text}</div>
        <div className="modal-actions">
          <button className="btn btn-ghost btn-full" onClick={onCancel}>Cancel</button>
          <button className={`btn ${danger?'btn-ruby':'btn-gold'} btn-full`} onClick={onConfirm}>Confirm</button>
        </div>
      </div>
    </div>
  );
}

// ─── Header ───────────────────────────────────────────────────────────────────
function Header({ onNav }) {
  return (
    <header className="header">
      <div className="header-inner">
        <div className="logo-section" onClick={()=>onNav('dashboard')} style={{cursor:'pointer'}}>
          <div className="logo-icon">Z</div>
          <div className="logo-text">
            <div className="logo-title">Z — CHITTI</div>
            <div className="logo-subtitle">Management Made Simple</div>
          </div>
        </div>
        <div className="header-right">
          <span className="welcome-text">Welcome, <span className="welcome-name">Admin</span></span>
          <button className="btn btn-outline-gold btn-sm" onClick={()=>onNav('monthly')}>📊 Monthly</button>
          <button className="btn btn-gold btn-sm" onClick={()=>onNav('addMember')}>＋ Add Member</button>
        </div>
      </div>
    </header>
  );
}

// ─── Dashboard ────────────────────────────────────────────────────────────────
function Dashboard({ onNav, notify }) {
  const [members, setMembers] = useState([]);
  const [chittis, setChittis] = useState([]);
  const [rdEntries, setRdEntries] = useState([]);
  const [payments, setPayments] = useState([]);
  const [search, setSearch] = useState('');
  const [tab, setTab] = useState('active');

  const load = () => {
    setMembers(DB.get('members'));
    setChittis(DB.get('chittis'));
    setRdEntries(DB.get('rdEntries'));
    setPayments(DB.get('payments'));
  };
  useEffect(load, []);

  const getChittiTotal = (mId) => chittis.filter(c=>c.memberId===mId).reduce((a,c)=>a+Number(c.amount),0);
  const getRdTotal = (mId) => rdEntries.filter(r=>r.memberId===mId).reduce((a,r)=>a+Number(r.amount),0);
  const getChittiCount = (mId) => chittis.filter(c=>c.memberId===mId).length;

  const activeMembers = members.filter(m=>m.status==='active');
  const cm = curMonth();

  const totalDue = activeMembers.reduce((acc, m) => {
    const paid = payments.filter(p=>p.memberId===m.id && p.month===cm);
    const chittiDue = getChittiTotal(m.id);
    const rdDue = getRdTotal(m.id);
    const paidC = paid.reduce((a,p)=>a+Number(p.chittiAmount||0),0);
    const paidR = paid.reduce((a,p)=>a+Number(p.rdAmount||0),0);
    return acc + Math.max(0,(chittiDue-paidC)) + Math.max(0,(rdDue-paidR));
  }, 0);

  const collectedMonth = payments.filter(p=>p.month===cm).reduce((a,p)=>a+Number(p.chittiAmount||0)+Number(p.rdAmount||0),0);

  const overdueCount = activeMembers.filter(m => {
    const p = payments.filter(pp=>pp.memberId===m.id && pp.month===cm);
    return p.length===0 || p.some(pp=>pp.status==='unpaid');
  }).length;

  const filtered = useMemo(() => {
    const q = search.toLowerCase().trim();
    return members.filter(m => {
      const matchTab = tab==='active' ? m.status==='active' : m.status==='quit';
      if (!matchTab) return false;
      if (!q) return true;
      return m.name.toLowerCase().includes(q) ||
        (m.nickname||'').toLowerCase().includes(q) ||
        (m.location||'').toLowerCase().includes(q);
    });
  }, [members, search, tab]);

  return (
    <div className="page">
      {/* Stats */}
      <div className="grid-4" style={{marginBottom:32}}>
        <StatCard icon="👥" label="Active Members" value={activeMembers.length} sub="Total enrolled" c1="#f5a623" c2="#ff8c00" />
        <StatCard icon="💰" label="Amount Due" value={fmt(totalDue)} sub="This month unpaid" c1="#ff4757" c2="#c0392b" />
        <StatCard icon="✅" label="Collected" value={fmt(collectedMonth)} sub="This month" c1="#00d68f" c2="#00b377" />
        <StatCard icon="⚠️" label="Overdue" value={overdueCount} sub="Members pending" c1="#9f7aea" c2="#6c5ce7" />
      </div>

      {/* Directory */}
      <div className="card">
        <div className="section-header">
          <div className="section-title">Members <span>Directory</span></div>
          <button className="btn btn-gold btn-sm" onClick={()=>onNav('addMember')}>＋ Add Member</button>
        </div>
        <div className="search-wrap" style={{marginBottom:16}}>
          <span className="search-icon">🔍</span>
          <input className="search-input" placeholder="Search member by name, nickname, or location..."
            value={search} onChange={e=>setSearch(e.target.value)} />
        </div>
        <div className="tab-bar" style={{marginBottom:20}}>
          <button className={`tab-btn ${tab==='active'?'active':''}`} onClick={()=>setTab('active')}>
            🟢 Active Members ({members.filter(m=>m.status==='active').length})
          </button>
          <button className={`tab-btn ${tab==='quit'?'active':''}`} onClick={()=>setTab('quit')}>
            ⚫ Past Members ({members.filter(m=>m.status==='quit').length})
          </button>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {filtered.length === 0 ? (
            <div className="empty-state">
              <div className="empty-icon">🔎</div>
              <div className="empty-text">{search ? 'No members found' : 'No members yet'}</div>
              <div className="empty-sub">{search ? 'Try a different search' : 'Add your first member to get started'}</div>
            </div>
          ) : filtered.map((m,i) => (
            <MemberCard key={m.id} member={m} style={{animationDelay:`${i*30}ms`}}
              chittis={chittis.filter(c=>c.memberId===m.id)}
              rdTotal={getRdTotal(m.id)}
              chittiTotal={getChittiTotal(m.id)}
              chittiCount={getChittiCount(m.id)}
              onClick={()=>onNav('memberDetail', m.id)}
            />
          ))}
        </div>
      </div>
    </div>
  );
}

function StatCard({ icon, label, value, sub, c1, c2 }) {
  return (
    <div className="stat-card" style={{'--c1':c1,'--c2':c2}}>
      <div className="stat-icon">{icon}</div>
      <div className="stat-label" style={{color:c1}}>{label}</div>
      <div className="stat-value" style={{color:c1}}>{value}</div>
      <div className="stat-sub" style={{color:c1}}>{sub}</div>
    </div>
  );
}

function MemberCard({ member, chittis, rdTotal, chittiTotal, chittiCount, onClick, style }) {
  return (
    <div className="member-card slide-in" onClick={onClick} style={style}>
      <div className="member-avatar">{getInitials(member.name)}</div>
      <div style={{flex:1,minWidth:0}}>
        <div className="member-name">{cap(member.name)}</div>
        <div className="member-meta">
          {member.location && <span>📍 {member.location}</span>}
          {chittiCount > 0 && <span style={{color:'var(--sapphire)'}}>🎟 {chittiCount} Chitti{chittiCount>1?'s':''}</span>}
          <span className={`status-badge ${member.status==='active'?'badge-active':'badge-quit'}`}>
            <span className={`status-dot ${member.status==='active'?'status-active':'status-quit'}`}></span>
            {member.status==='active'?'Active':'Quit'}
          </span>
        </div>
      </div>
      <div className="member-amounts">
        {chittiTotal > 0 && (
          <div className="amount-chip">
            <span className="amount-label" style={{color:'var(--gold-primary)'}}>Chitti</span>
            <span className="amount-value text-gold">{fmt(chittiTotal)}</span>
          </div>
        )}
        {rdTotal > 0 && (
          <div className="amount-chip">
            <span className="amount-label" style={{color:'var(--violet)'}}>RD</span>
            <span className="amount-value text-violet">{fmt(rdTotal)}</span>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Member Form (Add / Edit) ─────────────────────────────────────────────────
function MemberForm({ memberId, onNav, notify }) {
  const isEdit = !!memberId;
  const [form, setForm] = useState({ name:'', nickname:'', phone:'', location:'', notes:'', status:'active' });
  const [chittis, setChittis] = useState([{ chittiNumber:'1', amount:'' }]);
  const [rdAmount, setRdAmount] = useState('');
  const [errors, setErrors] = useState({});
  const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);

  useEffect(() => {
    if (isEdit) {
      const m = DB.get('members').find(x=>x.id===memberId);
      if (m) {
        setForm({ name:m.name, nickname:m.nickname||'', phone:m.phone||'', location:m.location||'', notes:m.notes||'', status:m.status });
        const c = DB.get('chittis').filter(x=>x.memberId===memberId);
        setChittis(c.length ? c.map(x=>({chittiNumber:String(x.chittiNumber),amount:String(x.amount)})) : [{chittiNumber:'1',amount:''}]);
        const r = DB.get('rdEntries').find(x=>x.memberId===memberId);
        setRdAmount(r ? String(r.amount) : '');
      }
    }
  }, [memberId]);

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = 'Member name is required';
    if (form.phone && !/^[0-9]{10}$/.test(form.phone.replace(/\s/g,''))) e.phone = 'Phone must be 10 digits';
    chittis.forEach((c,i) => {
      if (c.amount && (isNaN(c.amount) || Number(c.amount) <= 0)) e[`chitti_${i}`] = 'Amount must be positive';
    });
    if (rdAmount && (isNaN(rdAmount) || Number(rdAmount) <= 0)) e.rd = 'RD amount must be positive';
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const handleSubmit = () => {
    if (!validate()) return;
    if (isEdit) {
      const members = DB.get('members').map(m => m.id===memberId ? {...m,...form,updatedAt:new Date().toISOString()} : m);
      DB.set('members', members);
      // Chittis
      let allChittis = DB.get('chittis').filter(c=>c.memberId!==memberId);
      chittis.filter(c=>c.amount).forEach((c,i) => {
        allChittis.push({ id: Date.now()+i, memberId, chittiNumber:Number(c.chittiNumber)||i+1, amount:Number(c.amount), createdAt:new Date().toISOString() });
      });
      DB.set('chittis', allChittis);
      // RD
      let allRd = DB.get('rdEntries').filter(r=>r.memberId!==memberId);
      if (rdAmount && Number(rdAmount)>0) allRd.push({ id:Date.now(), memberId, amount:Number(rdAmount), createdAt:new Date().toISOString() });
      DB.set('rdEntries', allRd);
      notify({ type:'success', msg:'Member updated successfully!' });
      onNav('memberDetail', memberId);
    } else {
      const newId = DB.nextId('members');
      const members = [...DB.get('members'), { id:newId, ...form, name:cap(form.name.trim()), createdAt:new Date().toISOString() }];
      DB.set('members', members);
      let allChittis = DB.get('chittis');
      chittis.filter(c=>c.amount).forEach((c,i) => {
        allChittis.push({ id: Date.now()+i, memberId:newId, chittiNumber:Number(c.chittiNumber)||i+1, amount:Number(c.amount), createdAt:new Date().toISOString() });
      });
      DB.set('chittis', allChittis);
      let allRd = DB.get('rdEntries');
      if (rdAmount && Number(rdAmount)>0) allRd.push({ id:Date.now(), memberId:newId, amount:Number(rdAmount), createdAt:new Date().toISOString() });
      DB.set('rdEntries', allRd);
      notify({ type:'success', msg:'Member added successfully!' });
      onNav('dashboard');
    }
  };

  const handleDelete = () => {
    DB.set('members', DB.get('members').filter(m=>m.id!==memberId));
    DB.set('chittis', DB.get('chittis').filter(c=>c.memberId!==memberId));
    DB.set('rdEntries', DB.get('rdEntries').filter(r=>r.memberId!==memberId));
    DB.set('payments', DB.get('payments').filter(p=>p.memberId!==memberId));
    notify({ type:'success', msg:'Member deleted.' });
    onNav('dashboard');
  };

  const addChitti = () => setChittis(prev => [...prev, { chittiNumber:String(prev.length+1), amount:'' }]);
  const removeChitti = (i) => setChittis(prev => prev.filter((_,idx)=>idx!==i));
  const updateChitti = (i, field, val) => setChittis(prev => prev.map((c,idx)=>idx===i?{...c,[field]:val}:c));

  return (

// ─── Monthly Summary ──────────────────────────────────────────────────────────
function MonthlySummary({ onNav, notify }) {
  const [selectedMonth, setSelectedMonth] = useState(curMonth());
  const [members, setMembers] = useState([]);
  const [chittis, setChittis] = useState([]);
  const [rdEntries, setRdEntries] = useState([]);
  const [payments, setPayments] = useState([]);
  const [editingPayment, setEditingPayment] = useState(null);
  const [sortBy, setSortBy] = useState('name');

  useEffect(() => {
    setMembers(DB.get('members').filter(m=>m.status==='active'));
    setChittis(DB.get('chittis'));
    setRdEntries(DB.get('rdEntries'));
    setPayments(DB.get('payments'));
  }, []);

  const months = useMemo(() => {
    const result = [];
    const now = new Date();
    for (let i = 0; i < 12; i++) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      result.push(d.toISOString().slice(0,7));
    }
    return result;
  }, []);

  const getChittiTotal = (mId) => chittis.filter(c=>c.memberId===mId).reduce((a,c)=>a+Number(c.amount),0);
  const getRdTotal = (mId) => rdEntries.filter(r=>r.memberId===mId).reduce((a,r)=>a+Number(r.amount),0);
  const getPayment = (mId) => payments.find(p=>p.memberId===mId && p.month===selectedMonth);

  const rows = useMemo(() => {
    return members.map(m => {
      const p = getPayment(m.id);
      const chittiDue = getChittiTotal(m.id);
      const rdDue = getRdTotal(m.id);
      const total = chittiDue + rdDue;
      const status = p ? p.status : 'unpaid';
      return { member:m, chittiDue, rdDue, total, payment:p, status };
    }).sort((a,b) => {
      if (sortBy==='name') return a.member.name.localeCompare(b.member.name);
      if (sortBy==='status') { const o={paid:0,partial:1,unpaid:2}; return o[a.status]-o[b.status]; }
      if (sortBy==='amount') return b.total-a.total;
      return 0;
    });
  }, [members, chittis, rdEntries, payments, selectedMonth, sortBy]);

  const stats = useMemo(() => ({
    total: rows.length,
    paid: rows.filter(r=>r.status==='paid').length,
    partial: rows.filter(r=>r.status==='partial').length,
    unpaid: rows.filter(r=>r.status==='unpaid').length,
    collected: rows.reduce((a,r)=>a+(r.payment?Number(r.payment.chittiAmount||0)+Number(r.payment.rdAmount||0):0),0),
  }), [rows]);

  const updatePaymentStatus = (mId, status, chittiAmount, rdAmount) => {
    let all = DB.get('payments');
    const existing = all.find(p=>p.memberId===mId && p.month===selectedMonth);
    if (existing) {
      all = all.map(p => p.id===existing.id ? {...p, status, chittiAmount:Number(chittiAmount||0), rdAmount:Number(rdAmount||0), updatedAt:new Date().toISOString()} : p);
    } else {
      all.push({ id:Date.now(), memberId:mId, month:selectedMonth, chittiAmount:Number(chittiAmount||0), rdAmount:Number(rdAmount||0), status, createdAt:new Date().toISOString() });
    }
    DB.set('payments', all);
    setPayments(DB.get('payments'));
    setEditingPayment(null);
    notify({ type:'success', msg:'Payment updated!' });
  };

  return (
    <div className="page">
      <button className="back-btn" onClick={()=>onNav('dashboard')}>← Back to Dashboard</button>
      <div style={{marginTop:20,marginBottom:28}}>
        <h1 style={{fontSize:28,fontWeight:800}} className="text-gold-grad">Monthly Summary</h1>
        <p style={{color:'var(--text-secondary)',fontSize:14,marginTop:4}}>Track payment status for all active members</p>
      </div>

      {/* Month selector + sort */}
      <div style={{display:'flex',gap:12,marginBottom:24,flexWrap:'wrap',alignItems:'center'}}>
        <select className="month-select" value={selectedMonth} onChange={e=>setSelectedMonth(e.target.value)}>
          {months.map(m=><option key={m} value={m}>{monthLabel(m)}</option>)}
        </select>
        <select className="month-select" value={sortBy} onChange={e=>setSortBy(e.target.value)}>
          <option value="name">Sort: Name</option>
          <option value="status">Sort: Status</option>
          <option value="amount">Sort: Amount</option>
        </select>
      </div>

      {/* Stats */}
      <div className="grid-4" style={{marginBottom:24}}>
        <div className="card" style={{textAlign:'center',padding:16}}>
          <div style={{fontSize:28,fontWeight:800,color:'var(--sapphire)'}}>{stats.total}</div>
          <div style={{fontSize:12,color:'var(--text-secondary)',marginTop:4}}>Total Members</div>
        </div>
        <div className="card" style={{textAlign:'center',padding:16}}>
          <div style={{fontSize:28,fontWeight:800,color:'var(--emerald)'}}>{stats.paid}</div>
          <div style={{fontSize:12,color:'var(--text-secondary)',marginTop:4}}>✅ Paid</div>
        </div>
        <div className="card" style={{textAlign:'center',padding:16}}>
          <div style={{fontSize:28,fontWeight:800,color:'var(--gold-primary)'}}>{stats.partial}</div>
          <div style={{fontSize:12,color:'var(--text-secondary)',marginTop:4}}>⚠️ Partial</div>
        </div>
        <div className="card" style={{textAlign:'center',padding:16}}>
          <div style={{fontSize:28,fontWeight:800,color:'var(--ruby)'}}>{stats.unpaid}</div>
          <div style={{fontSize:12,color:'var(--text-secondary)',marginTop:4}}>❌ Unpaid</div>
        </div>
      </div>
      <div className="card" style={{marginBottom:20,padding:'12px 20px',textAlign:'center'}}>
        <span style={{color:'var(--text-secondary)',fontSize:13}}>Total Collected: </span>
        <span style={{fontSize:20,fontWeight:800,color:'var(--emerald)'}}>{fmt(stats.collected)}</span>
      </div>

      {/* Table */}
      <div className="card" style={{padding:0,overflow:'hidden'}}>
        <div style={{overflowX:'auto'}}>
          <table className="pay-table">
            <thead>
              <tr>
                <th>Member</th>
                <th>Chitti Due</th>
                <th>RD Due</th>
                <th>Total</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              {rows.length===0 ? (
                <tr><td colSpan={6} style={{textAlign:'center',padding:40,color:'var(--text-muted)'}}>No active members</td></tr>
              ) : rows.map(r => (
                <tr key={r.member.id}>
                  <td>
                    <div style={{fontWeight:700,color:'var(--gold-primary)',fontSize:15}}>{cap(r.member.name)}</div>
                    {r.member.location && <div style={{fontSize:11,color:'var(--text-muted)'}}>{r.member.location}</div>}
                  </td>
                  <td style={{color:'var(--sapphire)',fontWeight:600}}>{fmt(r.chittiDue)}</td>
                  <td style={{color:'var(--violet)',fontWeight:600}}>{fmt(r.rdDue)}</td>
                  <td style={{color:'var(--gold-primary)',fontWeight:800,fontSize:16}}>{fmt(r.total)}</td>
                  <td>
                    <span className={`status-badge badge-${r.status}`}>
                      {r.status==='paid'?'✅ Paid':r.status==='partial'?'⚠️ Partial':'❌ Unpaid'}
                    </span>
                  </td>
                  <td>
                    <button className="btn btn-outline-gold btn-sm" onClick={()=>setEditingPayment(r)}>Update</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* Payment update modal */}
      {editingPayment && (
        <PaymentModal row={editingPayment} month={selectedMonth}
          onSave={(status,ca,ra) => updatePaymentStatus(editingPayment.member.id, status, ca, ra)}
          onClose={()=>setEditingPayment(null)} />
      )}
    </div>
  );
}

function PaymentModal({ row, month, onSave, onClose }) {
  const [status, setStatus] = useState(row.payment?.status || 'unpaid');
  const [ca, setCa] = useState(String(row.payment?.chittiAmount||row.chittiDue||''));
  const [ra, setRa] = useState(String(row.payment?.rdAmount||row.rdDue||''));

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">💸 Update Payment</div>
        <div style={{color:'var(--gold-primary)',fontWeight:700,fontSize:18,marginBottom:4}}>{cap(row.member.name)}</div>
        <div style={{color:'var(--text-secondary)',fontSize:13,marginBottom:20}}>{monthLabel(month)}</div>

        <div className="form-group">
          <label className="form-label">Chitti Amount Paid (₹)</label>
          <input className="form-input" type="number" value={ca} onChange={e=>setCa(e.target.value)} placeholder="0" />
          <div style={{fontSize:11,color:'var(--text-muted)',marginTop:4}}>Due: {fmt(row.chittiDue)}</div>
        </div>
        <div className="form-group">
          <label className="form-label">RD Amount Paid (₹)</label>
          <input className="form-input" type="number" value={ra} onChange={e=>setRa(e.target.value)} placeholder="0" />
          <div style={{fontSize:11,color:'var(--text-muted)',marginTop:4}}>Due: {fmt(row.rdDue)}</div>
        </div>
        <div className="form-group">
          <label className="form-label">Payment Status</label>
          <select className="form-input" value={status} onChange={e=>setStatus(e.target.value)}>
            <option value="paid">✅ Paid</option>
            <option value="partial">⚠️ Partial</option>
            <option value="unpaid">❌ Unpaid</option>
          </select>
        </div>
        <div className="modal-actions">
          <button className="btn btn-ghost btn-full" onClick={onClose}>Cancel</button>
          <button className="btn btn-gold btn-full" onClick={()=>onSave(status,ca,ra)}>Save Payment</button>
        </div>
      </div>
    </div>
  );
}

// ─── App Shell ────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('dashboard');
  const [pageData, setPageData] = useState(null);
  const [notif, setNotif] = useState(null);

  const navigate = (p, data) => { setPage(p); setPageData(data||null); window.scrollTo(0,0); };
  const notify = (n) => setNotif(n);

  return (
    <>
      <Header onNav={navigate} />
      {page==='dashboard' && <Dashboard onNav={navigate} notify={notify} />}
      {page==='addMember' && <MemberForm memberId={null} onNav={navigate} notify={notify} />}
      {page==='editMember' && <MemberForm memberId={pageData} onNav={navigate} notify={notify} />}
      {page==='memberDetail' && <MemberDetail memberId={pageData} onNav={navigate} notify={notify} />}
      {page==='monthly' && <MonthlySummary onNav={navigate} notify={notify} />}
      <Notification notif={notif} onClose={()=>setNotif(null)} />
    </>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
